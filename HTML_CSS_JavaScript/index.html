		<script>
			const VOWELS = [
				{ char: 'A', ipa: '/a/', name: 'aperta', f1: 800, f2: 1200, f3: 2500, lip: 0.8, tongueY: 110 },
				{ char: 'É', ipa: '/e/', name: 'medio-alta', f1: 430, f2: 2100, f3: 2800, lip: 0.5, tongueY: 90 },
				{ char: 'È', ipa: '/ɛ/', name: 'medio-bassa', f1: 580, f2: 1800, f3: 2700, lip: 0.6, tongueY: 98 },
				{ char: 'I', ipa: '/i/', name: 'alta', f1: 280, f2: 2600, f3: 3200, lip: 0.3, tongueY: 75 },
				{ char: 'Ó', ipa: '/o/', name: 'medio-alta', f1: 440, f2: 780, f3: 2600, lip: 0.9, tongueY: 88 },
				{ char: 'Ò', ipa: '/ɔ/', name: 'medio-bassa', f1: 570, f2: 850, f3: 2550, lip: 1.0, tongueY: 97 },
				{ char: 'U', ipa: '/u/', name: 'alta', f1: 310, f2: 870, f3: 2300, lip: 1.1, tongueY: 78 },
			];

			const PRESETS_SEX = [
				{ name: 'Uomo',   pitch: 120, f1m: 1.0,  f2m: 1.0,  f3m: 1.0  },
				{ name: 'Donna',  pitch: 220, f1m: 1.15, f2m: 1.1,  f3m: 1.05 },
			];

			const PRESETS_AGE = [
				{ name: 'Bambino/a',	pitch: 320, f1m: 1.35, f2m: 1.25, f3m: 1.15, vibrato: 0.2,  breath: 0.2  },
				{ name: 'Adulto/a',	 pitch: null, f1m: 1.0,  f2m: 1.0,  f3m: 1.0,  vibrato: 0.4,  breath: 0.15 },
				{ name: 'Anziano/a',	pitch: null, f1m: 1.05, f2m: 0.98, f3m: 0.96, vibrato: 1.2,  breath: 0.35 },
			];

			const PRESETS_TONE = [
				{ name: 'Acuta',	  pitch: 280, f1m: 1.2,  f2m: 1.15, f3m: 1.1  },
				{ name: 'Intermedia', pitch: null, f1m: 1.0,  f2m: 1.0,  f3m: 1.0  },
				{ name: 'Profonda',   pitch: 85,  f1m: 0.9,  f2m: 0.92, f3m: 0.9  },
			];

			const SLIDERS = [
				{ id: 'pitch', label: 'Frequenza fondamentale', min: 60, max: 500, step: 1, unit: ' Hz', def: 120 },
				{ id: 'f1m', label: 'Scala F1 (apertura)', min: 0.5, max: 2.0, step: 0.01, unit: '×', def: 1.0 },
				{ id: 'f2m', label: 'Scala F2 (lingua)', min: 0.5, max: 2.0, step: 0.01, unit: '×', def: 1.0 },
				{ id: 'f3m', label: 'Scala F3 (timbro)', min: 0.5, max: 2.0, step: 0.01, unit: '×', def: 1.0 },
				{ id: 'vibrato', label: 'Vibrato', min: 0, max: 3.0, step: 0.05, unit: '', def: 0.4 },
				{ id: 'breath', label: 'Aria / Breathiness', min: 0, max: 1.0, step: 0.01, unit: '', def: 0.15 },
				{ id: 'duration', label: 'Durata', min: 0.3, max: 4.0, step: 0.1, unit: ' s', def: 1.8 },
				{ id: 'gain', label: 'Volume', min: 0.1, max: 1.0, step: 0.01, unit: '', def: 0.7 },
			];

			let params = {};
			SLIDERS.forEach(s => params[s.id] = s.def);
			let activePreset = 0;
			let currentVowelIdx = -1;
			let audioCtx = null;
			let activeNodes = [];
			let animId = null;
			let analyser = null;
			let dataArray = null;
			let isLooping = false;
			let loopNodes = {};

			function buildVowelButtons(){
				const grid = document.getElementById('vowelsGrid');
				VOWELS.forEach((v, i) => {
					const btn = document.createElement('button');
					btn.className = 'vowel-btn';
					btn.id = \`vbtn-\${i}\`;
					btn.innerHTML = \`
						<span class="vowel-char">\${v.char}</span>
						<span class="vowel-ipa">\${v.ipa}</span>
						<span class="vowel-name">\${v.name}</span>
					\`;
					btn.addEventListener('click', () => selectVowel(i));
					grid.appendChild(btn);
				});
			}

			let activeVoice = { sex: 0, age: 1, tone: 1 };

			function buildPresets(){
				const row = document.getElementById('presetsRow');
				row.innerHTML = '';
				row.classList.add('voice-presets-panel');
				const groups = [
					{ key: 'sex', label: 'Sesso', presets: PRESETS_SEX },
					{ key: 'age', label: 'Età', presets: PRESETS_AGE   },
					{ key: 'tone', label: 'Tono', presets: PRESETS_TONE  },
				];
				groups.forEach(g => {
					const groupEl = document.createElement('div');
					groupEl.className = 'voice-preset-group';
					const labelEl = document.createElement('div');
					labelEl.className = 'voice-preset-group-label';
					labelEl.textContent = g.label;
					groupEl.appendChild(labelEl);
					const radioRow = document.createElement('div');
					radioRow.className = 'voice-radio-row';
					g.presets.forEach((p, i) => {
						const lbl = document.createElement('label');
						const input = document.createElement('input');
						input.type = 'radio';
						input.name = 'voice-' + g.key;
						input.value = i;
						if(i === activeVoice[g.key]){
							input.checked = true;
						}
						input.addEventListener('change', () => {
							activeVoice[g.key] = i;
							applyMergedPreset();
							if(isLooping){
								liveUpdateLoop();
							}
						});
						const span = document.createElement('span');
						span.textContent = p.name;
						lbl.appendChild(input);
						lbl.appendChild(span);
						radioRow.appendChild(lbl);
					});
					groupEl.appendChild(radioRow);
					row.appendChild(groupEl);
				});
			}

			function applyMergedPreset(){
				const sex = PRESETS_SEX[activeVoice.sex];
				const age = PRESETS_AGE[activeVoice.age];
				const tone = PRESETS_TONE[activeVoice.tone];
				let pitch = sex.pitch;
				if(age.pitch !== null){
					pitch = age.pitch;
				}
				if(tone.pitch !== null){
					pitch = tone.pitch;
				}
				params.pitch = pitch;
				params.f1m = sex.f1m*age.f1m*tone.f1m;
				params.f2m = sex.f2m*age.f2m*tone.f2m;
				params.f3m = sex.f3m*age.f3m*tone.f3m;
				params.vibrato = age.vibrato ?? sex.vibrato ?? 0.4;
				params.breath = age.breath ?? sex.breath ?? 0.15;
				['pitch','f1m','f2m','f3m','vibrato','breath'].forEach(k => {
					const sl = document.getElementById(\`sl-\${k}\`);
					if(sl){
						sl.value = params[k];
					}
					const vl = document.getElementById(\`val-\${k}\`);
					if(vl){
						vl.textContent = fmt(k, params[k]);
					}
				});
			}

			function buildSliders(){
				const grid = document.getElementById('slidersGrid');
				SLIDERS.forEach(s => {
					const group = document.createElement('div');
					group.className = 'slider-group';
					group.innerHTML = \`
						<label>\${s.label} <span class="val" id="val-\${s.id}">\${fmt(s.id, params[s.id])}</span></label>
						<input type="range" id="sl-\${s.id}" min="\${s.min}" max="\${s.max}" step="\${s.step}" value="\${params[s.id]}">
					\`;
					grid.appendChild(group);
					group.querySelector('input').addEventListener('input', e => {
						params[s.id] = parseFloat(e.target.value);
						document.getElementById(\`val-\${s.id}\`).textContent = fmt(s.id, params[s.id]);
						document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
						if(isLooping){
							liveUpdateLoop();
						}
						if(s.id === 'f1m' || s.id === 'f2m'){
							syncArtSlidersFromFormants();
						}
					});
				});
			}

			const F1_MIN = 250, F1_MAX = 900;
			const F2_MIN = 700, F2_MAX = 2700;
			let artParams = { f1hz: null, f2hz: null };

			function apertura2f1(v){
				return F1_MIN + (v/100)*(F1_MAX - F1_MIN);
			}

			function lingua2f2(v){
				return F2_MIN + (v/100)*(F2_MAX - F2_MIN);
			}

			function f1ToApertura(hz){
				return Math.round(Math.max(0, Math.min(100, (hz - F1_MIN)/(F1_MAX - F1_MIN)*100)));
			}

			function f2ToLingua(hz){
				return Math.round(Math.max(0, Math.min(100, (hz - F2_MIN)/(F2_MAX - F2_MIN)*100)));
			}

			function aperturaLabel(v){
				if(v < 20){
					return 'Molto chiusa';
				}
				if(v < 40){
					return 'Semichiusa';
				}
				if(v < 60){
					return 'Normale';
				}
				if(v < 80){
					return 'Aperta';
				}
				return 'Spalancata';
			}

			function linguaLabel(v){
				if(v < 20){
					return 'Molto posteriore';
				}
				if(v < 40){
					return 'Posteriore';
				}
				if(v < 60){
					return 'Centrale';
				}
				if(v < 80){
					return 'Anteriore';
				}
				return 'Molto anteriore';
			}

			function findClosestVowel(f1hz, f2hz){
				let best = null, bestDist = Infinity;
				VOWELS.forEach(v => {
					const d = Math.hypot((v.f1 - f1hz)/100, (v.f2 - f2hz)/400);
					if(d < bestDist){
						bestDist = d;
						best = v;
					}
				});
				return best;
			}

			function updateProximityIndicator(f1hz, f2hz){
				const v = findClosestVowel(f1hz, f2hz);
				if(!v){
					return;
				}
				document.getElementById('proxChar').textContent = v.char;
				document.getElementById('proxIpa').textContent = v.ipa;
				document.getElementById('proxName').textContent = '— ' + v.name;
			}

			function syncArtSlidersFromFormants(){
				if(currentVowelIdx < 0){
					return;
				}
				const v = VOWELS[currentVowelIdx];
				const f1hz = v.f1*params.f1m;
				const f2hz = v.f2*params.f2m;
				const apVal = f1ToApertura(f1hz);
				const liVal = f2ToLingua(f2hz);
				document.getElementById('sl-apertura').value = apVal;
				document.getElementById('sl-lingua').value = liVal;
				document.getElementById('val-apertura').textContent = aperturaLabel(apVal);
				document.getElementById('val-lingua').textContent = linguaLabel(liVal);
				updateProximityIndicator(f1hz, f2hz);
			}

			function buildArticulatorySliders(){
				const slAp = document.getElementById('sl-apertura');
				const slLi = document.getElementById('sl-lingua');
				slAp.addEventListener('input', () => {
					const apVal = parseInt(slAp.value);
					document.getElementById('val-apertura').textContent = aperturaLabel(apVal);
					const f1hz = apertura2f1(apVal);
					const f2hz = lingua2f2(parseInt(slLi.value));
					if(currentVowelIdx >= 0){
						const v = VOWELS[currentVowelIdx];
						params.f1m = f1hz/v.f1;
						const sl1 = document.getElementById('sl-f1m');
						if(sl1){
							sl1.value = params.f1m;
							document.getElementById('val-f1m').textContent = fmt('f1m', params.f1m);
						}
					}else{
						artParams.f1hz = f1hz;
					}
					document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
					updateProximityIndicator(f1hz, f2hz);
					if(currentVowelIdx >= 0){
						const v = VOWELS[currentVowelIdx];
						const blendV = findClosestVowel(f1hz, f2hz);
						updateDiagramFromHz(f1hz, f2hz, blendV);
						updateFormantBars(f1hz, v.f2*params.f2m, v.f3*params.f3m);
					}
					if(isLooping){
						liveUpdateLoop();
					}
				});
				slLi.addEventListener('input', () => {
					const liVal = parseInt(slLi.value);
					document.getElementById('val-lingua').textContent = linguaLabel(liVal);
					const f1hz = apertura2f1(parseInt(slAp.value));
					const f2hz = lingua2f2(liVal);
					if(currentVowelIdx >= 0){
						const v = VOWELS[currentVowelIdx];
						params.f2m = f2hz/v.f2;
						const sl2 = document.getElementById('sl-f2m');
						if(sl2){
							sl2.value = params.f2m;
							document.getElementById('val-f2m').textContent = fmt('f2m', params.f2m);
						}
					}else{
						artParams.f2hz = f2hz;
					}
					document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
					updateProximityIndicator(f1hz, f2hz);
					if(currentVowelIdx >= 0){
						const v = VOWELS[currentVowelIdx];
						updateDiagramFromHz(f1hz, f2hz, findClosestVowel(f1hz, f2hz));
						updateFormantBars(v.f1*params.f1m, f2hz, v.f3*params.f3m);
					}
					if(isLooping){
						liveUpdateLoop();
					}
				});
			}

			function updateDiagramFromHz(f1hz, f2hz, refVowel){
				const tY = 75 + ((f1hz - F1_MIN)/(F1_MAX - F1_MIN))*40;
				const lip = refVowel ? refVowel.lip : 0.6;
				const tp = document.getElementById('tonguePath');
				const yOff = tY;
				tp.setAttribute('d', \`M15 \${yOff+8} Q40 \${yOff-2} 65 \${yOff-7} Q85 \${yOff-10} 100 \${yOff-5} Q105 \${yOff+8} 95 \${yOff+13} Q60 \${yOff+16} 20 \${yOff+13} Z\`);
				const lipsEl = document.getElementById('lipsEllipse');
				lipsEl.setAttribute('rx', (10 + lip*6).toFixed(1));
				lipsEl.setAttribute('ry', (4 + lip*5).toFixed(1));
			}

			function fmt(id, v){
				const s = SLIDERS.find(x => x.id === id);
				if(!s){
					return v;
				}
				if(s.step >= 0.01 && s.step < 1){
					return v.toFixed(2) + s.unit;
				}
				if(s.step < 0.1){
					return v.toFixed(2) + s.unit;
				}
				return Math.round(v) + s.unit;
			}

			function applyPreset(i){
				const p = PRESETS[i];
				activePreset = i;
				document.querySelectorAll('.preset-btn').forEach((b, j) => b.classList.toggle('active', j === i));
				['pitch','f1m','f2m','f3m','vibrato','breath','duration'].forEach(k => {
					if(p[k] !== undefined){
						params[k] = p[k];
						const sl = document.getElementById(\`sl-\${k}\`);
						if(sl){
							sl.value = p[k];
						}
						const vl = document.getElementById(\`val-\${k}\`);
						if(vl){
							vl.textContent = fmt(k, p[k]);
						}
					}
				});
			}

			function ensureCtx(){
				if(!audioCtx){
					audioCtx = new (window.AudioContext || window.webkitAudioContext)();
					analyser = audioCtx.createAnalyser();
					analyser.fftSize = 2048;
					dataArray = new Float32Array(analyser.fftSize);
					analyser.connect(audioCtx.destination);
				}
				if(audioCtx.state === 'suspended'){
					audioCtx.resume();
				}
			}

			function stopAll(){
				activeNodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
				activeNodes = [];
			}

			function selectVowel(idx){
				currentVowelIdx = idx;
				document.querySelectorAll('.vowel-btn').forEach(b => b.classList.remove('playing'));
				document.getElementById(\`vbtn-\${idx}\`).classList.add('playing');
				const v = VOWELS[idx];
				updateDiagram(v);
				updateFormantBars(v.f1*params.f1m, v.f2*params.f2m, v.f3*params.f3m);
				syncArtSlidersFromFormants();
				document.getElementById('transportHint').innerHTML =
					\`<strong>\${v.char}</strong> <span style="color:var(--muted)">\${v.ipa} — \${v.name}</span>\`;
				document.getElementById('btnPlay').disabled = false;
				if(isLooping){
					startLoop(idx);
				}
			}

			function playVowel(idx){
				selectVowel(idx);
				if(!isLooping){
					ensureCtx();
					stopAll();
					_playSingleShot(idx);
				}
			}

			function _playSingleShot(idx){
				const v = VOWELS[idx];
				const now = audioCtx.currentTime;
				const dur = params.duration;
				const f0 = params.pitch;
				const masterGain = audioCtx.createGain();
				masterGain.gain.setValueAtTime(0, now);
				masterGain.gain.linearRampToValueAtTime(params.gain*0.8, now + 0.05);
				masterGain.gain.setValueAtTime(params.gain*0.8, now + dur - 0.12);
				masterGain.gain.linearRampToValueAtTime(0, now + dur);
				masterGain.connect(analyser);
				const vibDepth = params.vibrato;
				let lfoGain;
				if(vibDepth > 0.01){
					const lfo = audioCtx.createOscillator();
					lfo.frequency.value = 5.5;
					lfoGain = audioCtx.createGain();
					lfoGain.gain.value = vibDepth*f0*0.025;
					lfo.connect(lfoGain);
					lfo.start(now);
					lfo.stop(now + dur + 0.1);
					activeNodes.push(lfo, lfoGain);
				}
				const osc = audioCtx.createOscillator();
				osc.type = 'sawtooth';
				osc.frequency.value = f0;
				if(lfoGain){
					lfoGain.connect(osc.frequency);
				}
				const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate*(dur + 0.1), audioCtx.sampleRate);
				const nd = noiseBuffer.getChannelData(0);
				for(let i = 0; i < nd.length; i++){
					nd[i] = Math.random()*2 - 1;
				}
				const noise = audioCtx.createBufferSource();
				noise.buffer = noiseBuffer;
				const noiseGain = audioCtx.createGain();
				noiseGain.gain.value = params.breath*0.25;
				noise.connect(noiseGain);
				const f1 = v.f1*params.f1m;
				const f2 = v.f2*params.f2m;
				const f3 = v.f3*params.f3m;
				const filt1 = _makeBPF(f1, 80);
				const filt2 = _makeBPF(f2, 100);
				const filt3 = _makeBPF(f3, 120);
				const fg1 = audioCtx.createGain();
				fg1.gain.value = 1.0;
				const fg2 = audioCtx.createGain();
				fg2.gain.value = 0.7;
				const fg3 = audioCtx.createGain();
				fg3.gain.value = 0.4;
				[osc, noiseGain].forEach(src => { src.connect(filt1); src.connect(filt2); src.connect(filt3); });
				filt1.connect(fg1);
				fg1.connect(masterGain);
				filt2.connect(fg2);
				fg2.connect(masterGain);
				filt3.connect(fg3);
				fg3.connect(masterGain);
				osc.start(now);
				osc.stop(now + dur + 0.1);
				noise.start(now);
				noise.stop(now + dur + 0.1);
				activeNodes.push(osc, noise, noiseGain, filt1, filt2, filt3, fg1, fg2, fg3, masterGain);
			}

			function _makeBPF(freq, bw){
				const bpf = audioCtx.createBiquadFilter();
				bpf.type = 'bandpass';
				bpf.frequency.value = freq;
				bpf.Q.value = freq/(bw || 90);
				return bpf;
			}

			function startLoop(idx){
				ensureCtx();
				stopAll();
				Object.values(loopNodes).forEach(n => {
					try { n.stop && n.stop(0); } catch(e) {}
					try { n.disconnect && n.disconnect(); } catch(e) {}
				});
				loopNodes = {};
				isLooping = false;
				isLooping = true;
				const v = VOWELS[idx];
				const now = audioCtx.currentTime;
				const f0 = params.pitch;
				const masterGain = audioCtx.createGain();
				masterGain.gain.setValueAtTime(0, now);
				masterGain.gain.linearRampToValueAtTime(params.gain*0.8, now + 0.06);
				masterGain.connect(analyser);
				const lfo = audioCtx.createOscillator();
				lfo.frequency.value = 5.5;
				const lfoGain = audioCtx.createGain();
				lfoGain.gain.value = params.vibrato*f0*0.025;
				lfo.connect(lfoGain);
				lfo.start(now);
				const osc = audioCtx.createOscillator();
				osc.type = 'sawtooth';
				osc.frequency.value = f0;
				lfoGain.connect(osc.frequency);
				const noiseLen = audioCtx.sampleRate*30;
				const noiseBuffer = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
				const nd = noiseBuffer.getChannelData(0);
				for(let i = 0; i < nd.length; i++){
					nd[i] = Math.random()*2 - 1;
				}
				const noise = audioCtx.createBufferSource();
				noise.buffer = noiseBuffer;
				noise.loop = true;
				const noiseGain = audioCtx.createGain();
				noiseGain.gain.value = params.breath*0.25;
				noise.connect(noiseGain);
				const f1 = v.f1*params.f1m;
				const f2 = v.f2*params.f2m;
				const f3 = v.f3*params.f3m;
				const filt1 = _makeBPF(f1, 80);
				const filt2 = _makeBPF(f2, 100);
				const filt3 = _makeBPF(f3, 120);
				const fg1 = audioCtx.createGain();
				fg1.gain.value = 1.0;
				const fg2 = audioCtx.createGain();
				fg2.gain.value = 0.7;
				const fg3 = audioCtx.createGain();
				fg3.gain.value = 0.4;
				[osc, noiseGain].forEach(src => { src.connect(filt1); src.connect(filt2); src.connect(filt3); });
				filt1.connect(fg1);
				fg1.connect(masterGain);
				filt2.connect(fg2);
				fg2.connect(masterGain);
				filt3.connect(fg3);
				fg3.connect(masterGain);
				osc.start(now);
				noise.start(now);
				loopNodes = { osc, lfo, lfoGain, noise, noiseGain, filt1, filt2, filt3, fg1, fg2, fg3, masterGain };
				updateFormantBars(f1, f2, f3);
				const btn = document.getElementById('btnPlay');
				btn.textContent = '▶';
				btn.classList.add('looping');
				document.getElementById('btnStop').disabled = false;
			}

			function stopLoop(updateUI = true){
				if(loopNodes.osc){
					const now = audioCtx ? audioCtx.currentTime : 0;
					try {
						loopNodes.masterGain.gain.setValueAtTime(loopNodes.masterGain.gain.value, now);
						loopNodes.masterGain.gain.linearRampToValueAtTime(0, now + 0.08);
					} catch(e) {}
					setTimeout(() => {
						Object.values(loopNodes).forEach(n => {
							try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e) {}
						});
					}, 100);
				}
				loopNodes = {};
				isLooping = false;
				if(updateUI){
					const btn = document.getElementById('btnPlay');
					btn.textContent = '▶';
					btn.classList.remove('looping');
					document.getElementById('btnStop').disabled = true;
				}
			}

			function liveUpdateLoop(){
				if(!isLooping || !loopNodes.osc){
					return;
				}
				const n = loopNodes;
				const now = audioCtx.currentTime;
				const v = VOWELS[currentVowelIdx];
				n.osc.frequency.setTargetAtTime(params.pitch, now, 0.02);
				n.lfoGain.gain.setTargetAtTime(params.vibrato*params.pitch*0.025, now, 0.05);
				const f1 = v.f1*params.f1m;
				const f2 = v.f2*params.f2m;
				const f3 = v.f3*params.f3m;
				n.filt1.frequency.setTargetAtTime(f1, now, 0.04);
				n.filt1.Q.value = f1/80;
				n.filt2.frequency.setTargetAtTime(f2, now, 0.04);
				n.filt2.Q.value = f2/100;
				n.filt3.frequency.setTargetAtTime(f3, now, 0.04);
				n.filt3.Q.value = f3/120;
				n.noiseGain.gain.setTargetAtTime(params.breath*0.25, now, 0.05);
				n.masterGain.gain.setTargetAtTime(params.gain*0.8, now, 0.04);
				updateFormantBars(f1, f2, f3);
			}

			function updateDiagram(v){
				const tp = document.getElementById('tonguePath');
				const yOff = v.tongueY;
				const newD = \`M15 \${yOff+8} Q40 \${yOff-2} 65 \${yOff-7} Q85 \${yOff-10} 100 \${yOff-5} Q105 \${yOff+8} 95 \${yOff+13} Q60 \${yOff+16} 20 \${yOff+13} Z\`;
				tp.setAttribute('d', newD);
				const lip = document.getElementById('lipsEllipse');
				lip.setAttribute('rx', (10 + v.lip*6).toFixed(1));
				lip.setAttribute('ry', (4 + v.lip*5).toFixed(1));
			}

			function updateFormantBars(f1, f2, f3){
				const maxF = [1200, 3200, 4000];
				document.getElementById('f1Bar').style.width = Math.min(100, f1/maxF[0]*100).toFixed(1) + '%';
				document.getElementById('f2Bar').style.width = Math.min(100, f2/maxF[1]*100).toFixed(1) + '%';
				document.getElementById('f3Bar').style.width = Math.min(100, f3/maxF[2]*100).toFixed(1) + '%';
				document.getElementById('f1Hz').textContent = Math.round(f1) + ' Hz';
				document.getElementById('f2Hz').textContent = Math.round(f2) + ' Hz';
				document.getElementById('f3Hz').textContent = Math.round(f3) + ' Hz';
			}

			const canvas = document.getElementById('waveformCanvas');
			const ctx2d = canvas.getContext('2d');

			function drawWaveform(){
				animId = requestAnimationFrame(drawWaveform);
				const W = canvas.width, H = canvas.height;
				ctx2d.clearRect(0, 0, W, H);
				ctx2d.fillStyle = '#16161a';
				ctx2d.fillRect(0, 0, W, H);
				ctx2d.strokeStyle = 'rgba(42,42,53,0.8)';
				ctx2d.lineWidth = 1;
				for(let x = 0; x <= W; x += W/8){
					ctx2d.beginPath();
					ctx2d.moveTo(x, 0);
					ctx2d.lineTo(x, H);
					ctx2d.stroke();
				}
				ctx2d.beginPath();
				ctx2d.moveTo(0, H/2);
				ctx2d.lineTo(W, H/2);
				ctx2d.stroke();
				if(!analyser){
					ctx2d.strokeStyle = 'rgba(122,120,112,0.3)';
					ctx2d.lineWidth = 1.5;
					ctx2d.beginPath();
					ctx2d.moveTo(0, H/2);
					ctx2d.lineTo(W, H/2);
					ctx2d.stroke();
					return;
				}
				analyser.getFloatTimeDomainData(dataArray);
				ctx2d.shadowBlur = 8;
				ctx2d.shadowColor = 'rgba(126,184,201,0.6)';
				ctx2d.strokeStyle = 'rgba(126,184,201,0.6)';
				ctx2d.lineWidth = 1;
				drawWaveShape();
				ctx2d.shadowBlur = 0;
				ctx2d.strokeStyle = 'rgba(126,184,201,1)';
				ctx2d.lineWidth = 1.5;
				drawWaveShape();
			}

			function drawWaveShape(){
				const W = canvas.width, H = canvas.height;
				const sliceW = W/dataArray.length;
				ctx2d.beginPath();
				for(let i = 0; i < dataArray.length; i++){
					const x = i*sliceW;
					const y = (1 - (dataArray[i] + 1)/2)*H;
					i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
				}
				ctx2d.stroke();
			}

			document.getElementById('btnPlay').addEventListener('click', () => {
				if(currentVowelIdx < 0){
					return;
				}
				if(isLooping){
					startLoop(currentVowelIdx);
				}else{
					startLoop(currentVowelIdx);
				}
			});

			document.getElementById('btnStop').addEventListener('click', () => {
				stopLoop(true);
				stopAll();
			});

			buildVowelButtons();
			buildPresets();
			buildSliders();
			buildArticulatorySliders();
			applyMergedPreset();
			drawWaveform();

			document.addEventListener('keydown', e => {
				if(e.target.tagName === 'INPUT'){
					return;
				}
				const map = { 'a': 0, 'e': 1, 'è': 2, 'i': 3, 'o': 4, 'ò': 5, 'u': 6, '1': 0, '2': 1, '3': 2, '4': 3, '5': 4, '6': 5, '7': 6 };
				const k = e.key.toLowerCase();
				if(map[k] !== undefined){
					selectVowel(map[k]);
				}else if(e.key === ' '){
					e.preventDefault();
					if(currentVowelIdx >= 0){
						isLooping ? stopLoop(true) : startLoop(currentVowelIdx);
					}
				}else if(e.key === 'Escape'){
					stopLoop(true);
					stopAll();
				}
			});
		<\/script>
	</body>
</html>` },

	};

	let currentUrl = null;
	let currentKey = null;

	function toggleSection(gridId){
		const grid = document.getElementById(gridId);
		const header = grid.previousElementSibling;
		const isOpen = grid.style.display === 'grid';
		grid.style.display = isOpen ? 'none' : 'grid';
		header.classList.toggle('open', !isOpen);
	}

	function openPage(key){
		const data = pages[key];
		if(!data){
			return;
		}
		currentKey = key;
		document.getElementById('app-title').innerText = data.name;
		const blob = new Blob([data.content], { type: 'text/html' });
		if(currentUrl){
			URL.revokeObjectURL(currentUrl);
		}
		currentUrl = URL.createObjectURL(blob);
		const viewer = document.getElementById('viewer');
		viewer.style.display = 'flex';
		document.body.style.overflow = 'hidden';
		document.getElementById('app-frame').src = currentUrl;
	}

	window.addEventListener('message', function(event){
		if(event.data === 'RELOAD_REQUEST'){
			if(currentKey){
				openPage(currentKey);
			}
		}
	});

	function closePage(){
		const viewer = document.getElementById('viewer');
		viewer.style.display = 'none';
		document.body.style.overflow = '';
		document.getElementById('app-frame').src = 'about:blank';
		currentKey = null;
	}

	window.history.pushState(null, null, window.location.href);

	window.onpopstate = function(){
		if(document.getElementById('viewer').style.display === 'flex'){
			window.history.pushState(null, null, window.location.href);
			closePage();
		}
	};
</script>
</body>
</html>
