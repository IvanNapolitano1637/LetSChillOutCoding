<!DOCTYPE html>
<html lang="en"><!--G08#017 - Mara - Checkers-->
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Checkers World Master</title>
		<style>
			:root{
				--bg: #1a1a1a;
				--panel: #262626;
				--accent: #27ae60;
				--danger: #e74c3c;
			}
			body{
				font-family: 'Segoe UI', sans-serif;
				background: var(--bg);
				color: #f0f0f0;
				display: flex;
				flex-direction: column;
				align-items: center;
				margin: 0;
				padding: 20px;
			}
			#setup-menu{
				background: var(--panel);
				padding: 30px;
				border-radius: 15px;
				box-shadow: 0 10px 40px rgba(0,0,0,0.8);
				text-align: center;
				max-width: 650px;
				border: 1px solid #444;
			}
			.variant-grid{
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 15px;
				margin: 25px 0;
			}
			label{
				background: #333;
				padding: 15px 10px;
				border-radius: 8px;
				cursor: pointer;
				font-size: 0.85em;
				transition: 0.3s;
				border: 1px solid transparent;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				line-height: 1.4;
			}
			label span{
				color: #888;
				font-size: 0.9em;
				margin-top: 4px;
				display: block;
			}
			label:hover{
				background: #444;
				border-color: var(--accent);
			}
			input[type="radio"]{
				margin-bottom: 8px;
				accent-color: var(--accent);
			}
			#game-container{
				display: none;
				flex-direction: column;
				align-items: center;
				width: 100%;
			}
			#board{
				display: grid;
				border: 10px solid #333;
				background: #000;
				box-shadow: 0 0 50px rgba(0,0,0,0.6);
				max-width: 95vw;
			}
			.cell{
				width: 50px;
				height: 50px;
				display: flex;
				justify-content: center;
				align-items: center;
				position: relative;
			}
			@media (max-width: 600px){
				.cell{
					width: 35px;
					height: 35px;
				}
			}
			.black-cell{
				background-color: #5d4037;
			}
			.white-cell{
				background-color: #d7ccc8;
			}
			.piece{
				width: 82%;
				height: 82%;
				border-radius: 50%;
				cursor: pointer;
				border: 3px solid rgba(0,0,0,0.3);
				z-index: 5;
				transition: transform 0.2s;
				position: relative;
			}
			.white-piece{
				background: radial-gradient(circle at 30% 30%, #ffffff, #b0b0b0);
			}
			.black-piece{
				background: radial-gradient(circle at 30% 30%, #424242, #000000);
			}
			.king::after{
				content: "👑";
				font-size: 1.2em;
				color: #ffeb3b;
				display: block;
				text-align: center;
				text-shadow: 0 0 3px #000;
			}
			.selected{
				transform: scale(1.1);
				outline: 4px solid #f1c40f;
				box-shadow: 0 0 20px #f1c40f;
				z-index: 10;
			}
			.status-bar{
				margin: 5px;
				font-size: 1.4em;
				color: #f1c40f;
				font-weight: bold;
				text-transform: uppercase;
			}
			.variant-badge{
				background: #444;
				padding: 4px 12px;
				border-radius: 20px;
				font-size: 0.6em;
				color: #aaa;
				margin-bottom: 10px;
				border: 1px solid #555;
			}
			.btn{
				padding: 15px 30px;
				border: none;
				color: white;
				border-radius: 8px;
				cursor: pointer;
				font-weight: bold;
				font-size: 1em;
				transition: 0.3s;
				flex: 3;
			}
			.btn-start{
				background: var(--accent);
			}
			.btn-reset{
				background: var(--danger);
			}
			.btn-lang{
				background: #444;
				border: 1px solid #666;
				padding: 15px 18px;
				border-radius: 8px;
				cursor: pointer;
				transition: 0.3s;
				display: flex;
				align-items: center;
				justify-content: center;
				min-width: 70px;
				flex: 1;
			}
			.btn-lang:hover{
				background: #555;
			}
			.btn-lang .flag-svg{
				width: 32px;
				height: 22px;
				display: block;
				pointer-events: none;
			}
			.button-row{
				display: flex;
				gap: 10px;
				width: 100%;
				margin-top: 20px;
			}
			*{
				-webkit-tap-highlight-color: transparent;
			}
		</style>

				<label><input type="radio" name="v" value="tu"><span id="v-tu">Turkish</span> <span>(8x8)</span></label>
			</div>
			<div class="button-row">
				<button class="btn btn-start" id="btnStart" onclick="startGame()">Start Game</button>
				<button class="btn-lang" id="btnLang1" onclick="nextLang()"></button>
			</div>
		</div>

			let currentLangIndex = 0;

			}

			function tv(key){
				return TRANSLATIONS[LANG_KEYS[currentLangIndex]].variants[key];
			}

			function updateUI(){
				document.getElementById('titleText').textContent = t('title');
				document.getElementById('subtitleText').textContent = t('subtitle');
				document.getElementById('btnStart').textContent = t('start');
				document.getElementById('btnExit').textContent = t('exit');

					if(el) el.textContent = tv(k);
				});

				document.getElementById('btnLang1').innerHTML = flag;

					} else {

					}

			}

			};

			function playSound(isCapture){
				if(AUDIO_CTX.state === 'suspended'){
					AUDIO_CTX.resume();
				}
				const osc = AUDIO_CTX.createOscillator();
				const gain = AUDIO_CTX.createGain();
				osc.connect(gain);
				gain.connect(AUDIO_CTX.destination);
				osc.frequency.setValueAtTime(isCapture ? 150 : 300, AUDIO_CTX.currentTime);
				gain.gain.setValueAtTime(0.1, AUDIO_CTX.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.01, AUDIO_CTX.currentTime + 0.1);
				osc.start();
				osc.stop(AUDIO_CTX.currentTime + 0.1);
			}

			function startGame(){
				const v = document.querySelector('input[name="v"]:checked').value;
				cfg = VARIANTS[v];
				cfg.variantKey = v;
				document.getElementById('active-variant-name').innerText = `${t('mode')}: ${tv(v)} (${cfg.s}x${cfg.s})`;
				document.getElementById('setup-menu').style.display = 'none';
				document.getElementById('game-container').style.display = 'flex';
				document.getElementById('status').innerText = t('whiteMove');
				initBoard();
			}

			function initBoard(){
				const b = document.getElementById('board');
				b.innerHTML = '';
				b.style.gridTemplateColumns = `repeat(${cfg.s}, minmax(30px, 50px))`;
				for(let r = 0; r < cfg.s; r++){
					for(let c = 0; c < cfg.s; c++){
						const cell = document.createElement('div');
						const isPlayable = cfg.ortho ? (r > 0 && r < cfg.s - 1) : (cfg.reverse ? (r + c)%2 === 0 : (r + c)%2 !== 0);
						cell.className = `cell ${isPlayable ? 'black-cell' : 'white-cell'}`;
						cell.dataset.r = r;
						cell.dataset.c = c;
						if(isPlayable){
							if(r < cfg.start){
								createPiece(cell, 'black');
							}else if(r >= cfg.s - cfg.start){
								createPiece(cell, 'white');
							}
						}
						cell.onclick = () => onCellClick(r, c);
						b.appendChild(cell);
					}
				}
			}

			function createPiece(cell, col){
				const p = document.createElement('div');
				p.className = `piece ${col}-piece`;
				cell.appendChild(p);
			}

			function onCellClick(r, c){
				if(turn !== 'white' || isAITurn){
					return;
				}
				const cell = getCell(r, c);
				const piece = cell.querySelector('.piece');
				if(piece && piece.classList.contains('white-piece')){
					deselect();
					piece.classList.add('selected');
					selected ={r, c, el: piece, king: piece.classList.contains('king')};
				}else if(selected && !piece){
					const move = checkMove(selected.r, selected.c, r, c, 'white', selected.king);
					if(move.valid){
						applyMove(selected.r, selected.c, r, c, move.cap);
						playSound(!!move.cap);
						if(move.cap && canJumpAgain(r, c, 'white', selected.king)){
							selected ={r, c, el: getCell(r,c).querySelector('.piece'), king: getCell(r,c).querySelector('.piece').classList.contains('king')};
							selected.el.classList.add('selected');
						}else{
							endTurn();
						}
					}
				}
			}

			function checkMove(sr, sc, tr, tc, col, isKing){
				const dr = tr - sr, dc = tc - sc, absR = Math.abs(dr), absC = Math.abs(dc);
				if(cfg.ortho){
					if(absR + absC === 1){
						if(!isKing && ((col === 'white' && dr > 0) || (col === 'black' && dr < 0))){
							return{valid:false};
						}
						return{valid: true, cap: null};
					}
					if(absR + absC === 2 && (absR === 2 || absC === 2)){
						const mr = sr + dr/2, mc = sc + dc/2, mid = getCell(mr, mc).querySelector('.piece');
						if(mid && !mid.classList.contains(col+'-piece')){
							return{valid: true, cap:{r: mr, c: mc}};
						}
					}
					return{valid: false};
				}
				if(absR !== absC){
					return{valid: false};
				}
				if(absR === 1){
					if(!isKing && !cfg.back && ((col === 'white' && dr>0) || (col === 'black' && dr<0))){
						return{valid: false};
					}
					return{valid: true, cap: null};
				}
				if(absR === 2){
					const mr = sr + dr/2, mc = sc + dc/2, mid = getCell(mr, mc).querySelector('.piece');
					if(mid && !mid.classList.contains(col+'-piece')){
						if(!isKing && !cfg.kingEat && mid.classList.contains('king')){
							return{valid: false};
						}
						return{valid: true, cap:{r: mr, c: mc}};
					}
				}
				if(isKing && cfg.fly && absR > 1){
					let enemies = [], stepR = dr/absR, stepC = dc/absC;
					for(let i = 1; i < absR; i++){
						const p = getCell(sr+i*stepR, sc+i*stepC).querySelector('.piece');
						if(p){
							if(p.classList.contains(col + '-piece')){
								return{valid: false};
							}
							enemies.push({r: sr + i*stepR, c: sc + i*stepC});
						}
					}
					if(enemies.length === 0){
						return{valid: true, cap: null};
					}
					if(enemies.length === 1){
						return{valid: true, cap: enemies[0]};
					}
				}
				return{valid: false};
			}

			function applyMove(sr, sc, tr, tc, cap){
				const p = getCell(sr, sc).querySelector('.piece');
				getCell(tr, tc).appendChild(p);
				if(cap){
					getCell(cap.r, cap.c).querySelector('.piece').remove();
				}
				if((turn === 'white' && tr === 0) || (turn === 'black' && tr === cfg.s-1)){
					p.classList.add('king');
				}
			}

			function canJumpAgain(r, c, col, isKing){
				const steps = cfg.ortho ? [[0,2],[0,-2],[2,0],[-2,0]] : [[2,2],[2,-2],[-2,2],[-2,-2]];
				return steps.some(s => {
					const tr = r + s[0], tc = c + s[1];
					return tr >= 0 && tr < cfg.s && tc >= 0 && tc < cfg.s && !getCell(tr,tc).querySelector('.piece') && checkMove(r, c, tr, tc, col, isKing).cap;
				});
			}

			function endTurn(){
				deselect();
				turn = (turn === 'white') ? 'black' : 'white';
				document.getElementById('status').innerText = (turn === 'white') ? t('whiteMove') : t('blackMove');
				setTimeout(() => {
					if(checkWin()){
						return;
					}
					if(turn === 'black'){
						isAITurn = true;
						setTimeout(cpuBrain, 700);
					}
				}, 600);
			}

			function cpuBrain(){
				const pieces = document.querySelectorAll('.black-piece');
				let moves = [];
				pieces.forEach(p => {
					const r = parseInt(p.parentElement.dataset.r), c = parseInt(p.parentElement.dataset.c), isKing = p.classList.contains('king');
					const range = (isKing && cfg.fly) ? cfg.s - 1 : 2;
					for(let dr = -range; dr <= range; dr++){
						for(let dc = -range; dc <= range; dc++){
							let tr = r + dr, tc = c + dc;
							if(tr >= 0 && tr < cfg.s && tc >= 0 && tc < cfg.s && !getCell(tr,tc).querySelector('.piece')){
								const m = checkMove(r, c, tr, tc, 'black', isKing);
								if(m.valid){
									moves.push({r, c, tr, tc, cap: m.cap});
								}
							}
						}
					}
				});
				if(moves.length > 0){
					const best = moves.sort((a,b) => (b.cap ? 1:0) - (a.cap ? 1:0))[0];
					applyMove(best.r, best.c, best.tr, best.tc, best.cap);
					playSound(!!best.cap);
					if(best.cap && canJumpAgain(best.tr, best.tc, 'black', getCell(best.tr, best.tc).querySelector('.piece').classList.contains('king'))){
						setTimeout(cpuBrain, 600);
					}else{
						isAITurn = false;
						endTurn();
					}
				}else{
					alert(t('youWin'));
					location.reload();
				}
			}

			function checkWin(){
				const w = document.querySelectorAll('.white-piece').length, b = document.querySelectorAll('.black-piece').length;
				if(w === 0){
					alert(t('blackWins'));
					location.reload();
					return true;
				}
				if(b === 0){
					alert(t('victory'));
					location.reload();
					return true;
				}
				return false;
			}

			function getCell(r, c){
				return document.querySelector(`[data-r='${r}'][data-c='${c}']`);
			}

			function deselect(){
				document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
				selected = null;
			}

			document.addEventListener("keydown", e => {
				if(e.key.toLowerCase() === "e"){
					location.reload();
				}else if(e.key.toLowerCase() === "l"){
					nextLang();
				}
			});
		</script>
	</body>
</html>
