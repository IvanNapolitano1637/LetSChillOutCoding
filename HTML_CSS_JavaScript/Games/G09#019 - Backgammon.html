<!DOCTYPE html>
<html lang="en"><!--G09#019 - Samuele - Backgammon-->
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Backgammon Elite</title>
		<style>
			:root{
				--wood: #3e2723;
				--felt: #1b5e20;
				--accent: #f1c40f;
			}
			body{
				background: #121212;
				font-family: sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				color: white;
				margin: 0;
				padding: 10px;
				-webkit-tap-highlight-color: transparent;
				user-select: none;
				touch-action: manipulation;
			}
			canvas{
				background: var(--felt);
				border: 10px solid var(--wood);
				border-radius: 12px;
				max-width: 100%;
				height: auto;
				cursor: pointer;
			}
			.panel{
				display: flex;
				width: 100%;
				max-width: 660px;
				flex-wrap: wrap;
				justify-content: center;
				align-items: center;
				background: #252525;
				padding: 15px;
				border-radius: 12px;
				margin-top: 10px;
				box-sizing: border-box;
				gap: 10px;
			}
			#dice-ui{
				font-size: 2em;
				min-width: 50px;
				text-align: center;
			}
			.btn{
				padding: 12px;
				font-size: 0.9em;
				cursor: pointer;
				background: #c0392b;
				border: none;
				color: white;
				border-radius: 6px;
				font-weight: bold;
				flex: 1;
				min-width: 80px;
			}
			.btn-undo{
				background: #2980b9;
			}
			.btn:disabled{
				opacity: 0.3;
			}
			.score-container{
				width: 100%;
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 5px;
				border-top: 1px solid #444;
				padding-top: 10px;
			}
			.btn-lang{
				background: #444;
				border: 1px solid #666;
				padding: 5px;
				border-radius: 6px;
				cursor: pointer;
				transition: 0.3s;
				display: flex;
				align-items: center;
				justify-content: center;
				width: 50px;
				height: 35px;
			}
			.btn-lang:hover{
				background: #555;
			}
			.flag-svg{
				width: 32px;
				height: 22px;
				pointer-events: none;
			}
			@media (min-width: 850px){
				#game-container{
					display: flex;
					flex-direction: row;
					align-items: flex-start;
					gap: 20px;
				}
				.panel{
					flex-direction: column;
					width: 180px;
					flex-wrap: nowrap;
					margin-top: 0;
					height: 540px;
					justify-content: flex-start;
				}
				.btn{
					width: 100%;
					flex: 0 0 auto;
					margin-bottom: 5px;
				}
				#dice-ui{
					margin-bottom: 20px;
					font-size: 3em;
				}
				.score-container{
					flex-direction: column;
					align-items: center;
					gap: 15px;
					margin-top: auto;
					border-top: none;
				}
			}
		</style>
	</head>
	<body>
		<div id="status" style="margin-bottom:10px">Roll the dice to play</div>
		<div id="game-container">
			<canvas id="board" width="660" height="540"></canvas>
			<div class="panel">
				<div id="dice-ui" style="font-size:3em; margin-bottom:10px">🎲</div>
				<button id="roll-btn" class="btn">ROLL THE DICE</button>
				<button id="undo-btn" class="btn btn-undo" disabled>UNDO</button>
				<div class="score-container">
					<div id="score-text" style="text-align:left; font-size: 0.9em;">
						⚪ <span id="txt-you">YOU</span>: <span id="w-off">0</span>/15<br/>
						⚫ <span id="txt-ai">AI</span>: <span id="b-off">0</span>/15
					</div>
					<button class="btn-lang" id="btnLang" onclick="nextLang()"></button>
				</div>
			</div>
		</div>
		<script>
			const FLAGS_SVG = [
				'<svg class="flag-svg" viewBox="0 0 60 30"><clipPath id="s"><path d="M0,0 v30 h60 v-30 z"/></clipPath><path d="M0,0 v30 h60 v-30 z" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#s)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></svg>', // UK
				//'<svg class="flag-svg" viewBox="0 0 7410 3900"><rect width="7410" height="3900" fill="#b22234"/><path d="M0 300h7410M0 900h7410M0 1500h7410M0 2100h7410M0 2700h7410M0 3300h7410" stroke="#fff" stroke-width="300"/><rect width="2964" height="2100" fill="#3c3b6e"/><path d="M247 175l247 759-646-469h798l-646 469z" fill="#fff" transform="scale(.2)"/></svg>', // US
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#008d46"/><rect width="1" height="2" x="1" fill="#f4f5f0"/><rect width="1" height="2" x="2" fill="#d2232c"/></svg>', // IT
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#002395"/><rect width="1" height="2" x="1" fill="#fff"/><rect width="1" height="2" x="2" fill="#ed2939"/></svg>', // FR
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#c60b1e"/><rect width="3" height="1" y="0.5" fill="#ffc400"/></svg>', // ES
				'<svg class="flag-svg" viewBox="0 0 5 3"><rect width="5" height="3"/><rect width="5" height="2" y="1" fill="#d00"/><rect width="5" height="1" y="2" fill="#ffce00"/></svg>', // DE
				'<svg class="flag-svg" viewBox="0 0 600 400"><rect width="240" height="400" fill="#006600"/><rect x="240" width="360" height="400" fill="#ff0000"/></svg>', // PT
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#002b7f"/><rect width="1" height="2" x="1" fill="#fcd116"/><rect width="1" height="2" x="2" fill="#ce1126"/></svg>', // RO
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="1" fill="#0057b7"/><rect width="3" height="1" y="1" fill="#ffd700"/></svg>', // UA
				'<svg class="flag-svg" viewBox="0 0 27 18"><rect width="27" height="18" fill="#005bae"/><path d="M0 2h27M0 6h27M0 10h27M0 14h27" stroke="#fff" stroke-width="2"/><rect width="10" height="10" fill="#005bae"/><path d="M5 0v10M0 5h10" stroke="#fff" stroke-width="2"/></svg>', // GR
				//'<svg class="flag-svg" viewBox="0 0 1 1"><rect width="0.5" height="1" fill="#ffe000"/><rect x="0.5" width="0.5" height="1" fill="#fff"/></svg>', // VA
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#800000"/><path d="M0.5,0.5 L2.5,0.5 L2.5,1.5 L0.5,1.5 Z" fill="none" stroke="#FFD700" stroke-width="0.1"/><text x="1.5" y="1.15" font-family="serif" font-weight="bold" font-size="0.4" fill="#FFD700" text-anchor="middle">SPQR</text></svg>', // ROMA
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#de2110"/><path d="M.5 1.1l.3-.9.3.9-1-.6h1z" fill="#ffde00" transform="matrix(.4 0 0 .4 .1 .1)"/></svg>', // CN
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r="0.6" fill="#bc002d"/></svg>' // JP
			];
			const LANG_KEYS = ['en','it','fr','es','de','pt','ro','uk','el','la','zh','ja'];
			const TRANSLATIONS = {
				en: { roll: "ROLL THE DICE", undo: "UNDO", you: "YOU", ai: "AI", start: "Roll the dice to play", move: "You to move!", aiMove: "AI is playing..." },
				it: { roll: "TIRA I DADI", undo: "ANNULLA", you: "TU", ai: "CPU", start: "Tira i dadi per giocare", move: "Tocca a te!", aiMove: "La CPU sta giocando..." },
				fr: { roll: "LANCER DÉS", undo: "ANNULER", you: "VOUS", ai: "IA", start: "Lancez les dés", move: "À vous de jouer !", aiMove: "L'IA joue..." },
				es: { roll: "TIRAR DADOS", undo: "DESHACER", you: "TÚ", ai: "IA", start: "Tira los dados", move: "¡Tu turno!", aiMove: "IA jugando..." },
				de: { roll: "WÜRFELN", undo: "ZURÜCK", you: "DU", ai: "KI", start: "Würfeln zum Starten", move: "Du bist dran!", aiMove: "KI spielt..." },
				pt: { roll: "LANÇAR DADOS", undo: "DESFAZER", you: "VOCÊ", ai: "IA", start: "Lance os dados", move: "Sua vez!", aiMove: "IA jogando..." },
				ro: { roll: "DAȚI CUBURILE", undo: "ANULARE", you: "TU", ai: "IA", start: "Aruncă zarurile", move: "Rândul tău!", aiMove: "IA gândește..." },
				uk: { roll: "КИНУТИ КУБИКИ", undo: "НАЗАД", you: "ВИ", ai: "AI", start: "Киньте кубики", move: "Ваш хід!", aiMove: "AI грає..." },
				el: { roll: "ΡΙΞΕ ΖΑΡΙΑ", undo: "ΑΝΑΙΡΕΣΗ", you: "ΕΣΥ", ai: "AI", start: "Ρίξτε τα ζάρια", move: "Σειρά σας!", aiMove: "Η AI παίζει..." },
				la: { roll: "ALEAM IACERE", undo: "REVERTERE", you: "TU", ai: "AI", start: "Iace aleam", move: "Tua pars!", aiMove: "AI ludit..." },
				zh: { roll: "掷骰子", undo: "撤销", you: "你", ai: "人工智能", start: "掷骰子开始", move: "轮到你了！", aiMove: "AI正在行动..." },
				ja: { roll: "サイコロを振る", undo: "戻す", you: "あなた", ai: "AI", start: "サイコロを振ってください", move: "あなたの番です！", aiMove: "AIが考えています..." }
			};
			let currentLangIndex = 0;

			function updateUI() {
				const lang = TRANSLATIONS[LANG_KEYS[currentLangIndex]];
				document.getElementById('roll-btn').innerText = lang.roll;
				document.getElementById('undo-btn').innerText = lang.undo;
				document.getElementById('txt-you').innerText = lang.you;
				document.getElementById('txt-ai').innerText = lang.ai;
				document.getElementById('btnLang').innerHTML = FLAGS_SVG[currentLangIndex];
				const status = document.getElementById('status');
				if(game.moves.length === 0){
					status.innerText = lang.start;
				}else if(game.turn === 1){
					status.innerText = lang.move;
				}else{
					status.innerText = lang.aiMove;
				}
			}

			function nextLang() {
				currentLangIndex = (currentLangIndex + 1)%LANG_KEYS.length;
				updateUI();
			}

			const CANVAS = document.getElementById('board');
			const CTX = CANVAS.getContext('2d');
			const ROLL_BTN = document.getElementById('roll-btn');
			const UNDO_BTN = document.getElementById('undo-btn');
			const BW = 660, BH = 540, TW = 46, TH = 200, PR = 18;
			let history = [];
			let game ={board: [2, 0, 0, 0, 0, -5, 0, -3, 0, 0, 0, 5, -5, 0, 0, 0, 3, 0, 5, 0, 0, 0, 0, -2], bar:{ 1: 0, "-1": 0 }, off:{ 1: 0, "-1": 0 }, turn: 1, dice: [], moves: [], selected: null };

			function getX(i){
				let col = i < 12 ? 11 - i : i - 12;
				let x = col*TW + 32;
				if(col >= 6){
					x += 45;
				}
				return x;
			}

			function draw(){
				CTX.fillStyle = "#3e2723";
				CTX.fillRect(0, 0, BW, BH);
				CTX.fillStyle = "#1b5e20";
				CTX.fillRect(10, 10, BW - 20, BH - 20);
				for(let i = 0; i < 24; i++){
					CTX.fillStyle = (i % 2 === 0) ? "#d7ccc8" : "#8d6e63";
					let x = getX(i), y = i >= 12 ? 10 : BH - 10;
					CTX.beginPath();
					CTX.moveTo(x, y);
					CTX.lineTo(x + TW, y);
					CTX.lineTo(x + TW/2, i >= 12 ? TH + 10 : BH - TH - 10);
					CTX.fill();
					let n = game.board[i], count = Math.abs(n), col = n > 0 ? "#fff" : "#222";
					for(let j = 0; j < count; j++){
						CTX.fillStyle = col;
						CTX.beginPath();
						CTX.arc(x + TW/2, i >= 12 ? (j*32 + 35) : (BH - j*32 - 35), PR, 0, 7);
						CTX.fill();
						CTX.stroke();
						if(game.selected === i && j === count - 1){
							CTX.strokeStyle = "#f1c40f";
							CTX.lineWidth = 3;
							CTX.stroke();
							CTX.strokeStyle = "#000";
							CTX.lineWidth = 1;
						}
					}
				}
				document.getElementById('w-off').innerText = game.off[1];
				document.getElementById('b-off').innerText = game.off[-1];
			}
			function rollTheDice(){
				if(game.turn === 1 && game.moves.length === 0){
					history = [];
					rollDice();
				}
			}

			ROLL_BTN.onclick = () => {
				rollTheDice();
			};

			function undo(){
				if(history.length > 0){
					game = JSON.parse(history.pop());
					UNDO_BTN.disabled = history.length === 0;
					draw();
				}
			}

			UNDO_BTN.onclick = () => {
				undo();
			};

			function rollDice(){
				game.dice = [Math.floor(Math.random()*6) + 1, Math.floor(Math.random()*6) + 1];
				game.moves = (game.dice[0] === game.dice[1]) ? [game.dice[0], game.dice[0], game.dice[0], game.dice[0]] : [...game.dice];
				document.getElementById('dice-ui').innerText = game.dice.join(" ");
				updateUI();
				if(game.turn === -1){
					setTimeout(aiPlay, 1000);
				}
				draw();
			}

			CANVAS.onclick = (e) => {
				if(game.turn !== 1 || game.moves.length === 0){
					return;
				}
				const rect = CANVAS.getBoundingClientRect();
				const x = (e.clientX - rect.left)*(BW/rect.width);
				const y = (e.clientY - rect.top)*(BH/rect.height);
				let clicked = -1;
				for(let i = 0; i < 24; i++){
					let px = getX(i);
					if(x >= px && x <= px + TW){
						clicked = i;
					}
				}
				if(x > BW - 60){
					clicked = 99;
				}
				if(game.selected === null){
					if(game.bar[1] > 0){
						game.selected = "bar";
					}else if(clicked !== -1 && game.board[clicked] > 0){
						game.selected = clicked;
					}
				}else{
					history.push(JSON.stringify(game));
					UNDO_BTN.disabled = false;
					if(!executeMove(game.selected, clicked)){
						history.pop();
						UNDO_BTN.disabled = history.length === 0;
					}
					game.selected = null;
				}
				draw();
			};

			function executeMove(f, t){
				let mIdx = game.moves.findIndex(m => {
					let target = (f === "bar") ? m - 1 : f + m;
					if(t === 99 && f >= 18 && target >= 24){
						return true;
					}
					return target === t;
				});
				if(mIdx === -1){
					return false;
				}
				if(t === 99){
					game.board[f]--;
					game.off[1]++;
				}else{
					if(game.board[t] < -1){
						return false;
					}
					if(game.board[t] === -1){
						game.board[t] = 0;
						game.bar[-1]++;
					}
					if(f === "bar"){
						game.bar[1]--;
					}else{
						game.board[f]--;
					}
					game.board[t]++;
				}
				game.moves.splice(mIdx, 1);
				if(game.moves.length === 0){
					game.turn = -1;
					setTimeout(rollDice, 800);
				}
				return true;
			}

			function aiPlay(){
				if(game.moves.length > 0){
					let moved = false;
					for(let m of game.moves){
						for(let i = 23; i >= 0; i--){
							if(game.board[i] < 0){
								let target = i - m;
								if(target >= 0 && game.board[target] <= 1){
									if(game.board[target] === 1){
										game.board[target] = 0;
										game.bar[1]++;
									}
									game.board[i]++;
									game.board[target]--;
									game.moves.splice(game.moves.indexOf(m), 1);
									moved = true;
									break;
								}
							}
						}
						if(moved){
							break;
						}
					}
					if(moved){
						draw();
						setTimeout(aiPlay, 600);
					}else{
						game.moves = [];
						game.turn = 1;
						updateUI();
						draw();
					}
				}else{
					game.turn = 1;
					updateUI();
					draw();
				}
			}

			document.addEventListener("keydown", e => {
				if(e.key.toLowerCase() === "r"){
					rollTheDice();
				}else if(e.key.toLowerCase() === "u"){
					undo();
				}else if(e.key.toLowerCase() === "l"){
					nextLang();
				}
			});

			updateUI();
			draw();
		</script>
	</body>
</html>
