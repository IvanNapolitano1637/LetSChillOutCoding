<!DOCTYPE HTML>
<html lang="en"><!--G06#014 - Serena - Fifteen-->
	<head>
		<title>Fifteen Puzzle</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<style>
			:root{
				--unit: 5px;
				--side: 100px;
				--border-color: #ff9f00;
			}
			body{
				margin: 0;
				padding: 10px;
				display: flex;
				justify-content: center;
				align-items: flex-start;
				padding-top: 40px;
				min-height: 100vh;
				font-family: 'Segoe UI', Arial, sans-serif;
				overflow-x: hidden;
				-webkit-tap-highlight-color: transparent;
				box-sizing: border-box;
			}
			#Fifteen{
				position: relative;
				user-select: none;
				-webkit-user-select: none;
			}
			canvas{
				display: block;
				max-width: 100%;
				height: auto;
			}
			.tile-container{
				position: absolute;
				display: flex;
				justify-content: center;
				align-items: center;
				pointer-events: none;
				z-index: 1;
				width: var(--side);
				height: var(--side);
				font-size: calc(var(--side)*0.6);
				font-weight: 600;
				line-height: var(--side);
			}
			#controls{
				position: absolute;
				display: flex;
				justify-content: space-between;
				z-index: 10;
				box-sizing: border-box;
			}
			.game-btn{
				flex: 1;
				font-family: 'Segoe UI', Arial, sans-serif;
				font-weight: 800;
				cursor: pointer;
				background: rgba(198, 252, 255, 0.9);
				color: #333;
				border-radius: 12px;
				text-transform: uppercase;
				transition: all 0.2s;
				border: calc(var(--unit)/3) solid var(--border-color);
			}
			.game-btn:hover{
				background: var(--border-color);
				color: #fff;
			}
			.game-btn:active{
				transform: translateY(2px);
				box-shadow: none !important;
			}
			.flag-svg{
				width: 36px;
				height: 22px;
				display: inline-block;
				vertical-align: middle;
				border: 1px solid #aaa;
				border-radius: 2px;
			}
			.help-overlay{
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(0,0,0,0.5);
				z-index: 1000;
				align-items: center;
				justify-content: center;
			}
			.help-overlay.show{
				display: flex;
			}
			.help-modal{
				background: rgba(198,252,255,0.98);
				border: 3px solid var(--border-color);
				border-radius: 16px;
				box-shadow: 0 10px 40px rgba(0,0,0,0.35);
				padding: 24px 28px 20px 28px;
				max-width: 400px;
				width: 92%;
				position: relative;
				animation: helpFadeIn 0.18s ease;
				font-family: 'Segoe UI', Arial, sans-serif;
			}
			@keyframes helpFadeIn{
				from{
					opacity:0;
					transform:scale(0.95);
				}
				to{
					opacity:1;
					transform:scale(1);
				}
			}
			.help-modal h4{
				color: #7b00c2;
				margin: 0 0 16px 0;
				font-size: 1.1em;
				text-align: center;
				letter-spacing: 0.5px;
			}
			.help-close{
				position: absolute;
				top: 12px;
				right: 14px;
				background: none;
				border: none;
				font-size: 1.3em;
				color: #999;
				cursor: pointer;
				padding: 2px 6px;
				line-height: 1;
				border-radius: 4px;
				font-weight: bold;
			}
			.help-close:hover{
				background: var(--border-color);
				color: #fff;
			}
			.help-table{
				width: 100%;
				border-collapse: collapse;
				font-size: 0.92em;
			}
			.help-table tr{
				border-bottom: 1px solid rgba(0,0,0,0.1);
			}
			.help-table tr:last-child{
				border-bottom: none;
			}
			.help-table td{
				padding: 7px 6px;
				vertical-align: middle;
			}
			.help-key{
				font-family: monospace;
				background: #fff;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				padding: 2px 8px;
				font-size: 0.95em;
				font-weight: bold;
				color: #333;
				white-space: nowrap;
				display: inline-block;
				min-width: 28px;
				text-align: center;
			}
			.help-desc{
				color: #333;
				padding-left: 8px;
			}
			.help-hint{
				text-align: center;
				margin-top: 14px;
				font-size: 0.78em;
				color: #888;
			}
		</style>
	</head>
	<body id="body">
		<div id="Fifteen">
			<canvas id="board">
				Upgrade Browser
			</canvas>
		</div>
		<div class="help-overlay" id="helpOverlay" onclick="closeHelp(event)">
			<div class="help-modal">
				<button class="help-close" onclick="toggleHelp()">✕</button>
				<h4 id="helpTitle">Keyboard Shortcuts</h4>
				<table class="help-table" id="helpTable"></table>
				<div class="help-hint" id="helpHint">Press ? to close</div>
			</div>
		</div>
		<script>
			const COLOR_1 = "#a7ffa7";
			const COLOR_2 = "#efefef";
			const BACKGROUND_COLOR = "#af67df";

			const HEIGHT = (4*SIDE) + (5*DIVISION_WIDTH) + (2*BORDER_WIDTH) + (MARGIN_DIM);
			let cursorX, cursorY, r1 = 3, c1 = 3, counterMoves = 0, gameFinished, begun = false, isSolving = false;
			document.documentElement.style.setProperty('--unit', UNIT + 'px');
			document.documentElement.style.setProperty('--side', SIDE + 'px');
			document.documentElement.style.setProperty('--border-color', BORDER_COLOR);
			const FLAGS_SVG = [
				'<svg class="flag-svg" viewBox="0 0 60 30"><clipPath id="s"><path d="M0,0 v30 h60 v-30 z"/></clipPath><path d="M0,0 v30 h60 v-30 z" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#s)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></svg>', // UK
				//'<svg class="flag-svg" viewBox="0 0 7410 3900"><rect width="7410" height="3900" fill="#b22234"/><path d="M0 300h7410M0 900h7410M0 1500h7410M0 2100h7410M0 2700h7410M0 3300h7410" stroke="#fff" stroke-width="300"/><rect width="2964" height="2100" fill="#3c3b6e"/><path d="M247 175l247 759-646-469h798l-646 469z" fill="#fff" transform="scale(.2)"/></svg>', // US
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#008d46"/><rect width="1" height="2" x="1" fill="#f4f5f0"/><rect width="1" height="2" x="2" fill="#d2232c"/></svg>', // IT
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#002395"/><rect width="1" height="2" x="1" fill="#fff"/><rect width="1" height="2" x="2" fill="#ed2939"/></svg>', // FR
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#c60b1e"/><rect width="3" height="1" y="0.5" fill="#ffc400"/></svg>', // ES
				'<svg class="flag-svg" viewBox="0 0 5 3"><rect width="5" height="3"/><rect width="5" height="2" y="1" fill="#d00"/><rect width="5" height="1" y="2" fill="#ffce00"/></svg>', // DE
				'<svg class="flag-svg" viewBox="0 0 600 400"><rect width="240" height="400" fill="#006600"/><rect x="240" width="360" height="400" fill="#ff0000"/></svg>', // PT
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#002b7f"/><rect width="1" height="2" x="1" fill="#fcd116"/><rect width="1" height="2" x="2" fill="#ce1126"/></svg>', // RO
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="1" fill="#0057b7"/><rect width="3" height="1" y="1" fill="#ffd700"/></svg>', // UA
				'<svg class="flag-svg" viewBox="0 0 27 18"><rect width="27" height="18" fill="#005bae"/><path d="M0 2h27M0 6h27M0 10h27M0 14h27" stroke="#fff" stroke-width="2"/><rect width="10" height="10" fill="#005bae"/><path d="M5 0v10M0 5h10" stroke="#fff" stroke-width="2"/></svg>', // GR
				//'<svg class="flag-svg" viewBox="0 0 1 1"><rect width="0.5" height="1" fill="#ffe000"/><rect x="0.5" width="0.5" height="1" fill="#fff"/></svg>', // VA
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#800000"/><path d="M0.5,0.5 L2.5,0.5 L2.5,1.5 L0.5,1.5 Z" fill="none" stroke="#FFD700" stroke-width="0.1"/><text x="1.5" y="1.15" font-family="serif" font-weight="bold" font-size="0.4" fill="#FFD700" text-anchor="middle">SPQR</text></svg>', // ROMA
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#de2110"/><path d="M.5 1.1l.3-.9.3.9-1-.6h1z" fill="#ffde00" transform="matrix(.4 0 0 .4 .1 .1)"/></svg>', // CN
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r="0.6" fill="#bc002d"/></svg>' // JP
			];
			const LANG_KEYS = ['en','it','fr','es','de','pt','ro','uk','el','la','zh','ja'];
			const TRANSLATIONS = {
				en: { shuffle:"Shuffle", solve:"Solve", wait:"Wait...", solved:"Solved in ", moves:" moves!", tooComplex:"Too complex...",
					helpTitle:"Keyboard Shortcuts", helpHint:"Press ? to close",
					helpShortcuts:[["↑","Move tile down (into blank)"],["↓","Move tile up (into blank)"],["←","Move tile right (into blank)"],["→","Move tile left (into blank)"],["R","Shuffle / restart"],["S","Auto-solve"],["L","Next language"],["?","Show / hide this help"]] },
				it: { shuffle:"Mescola", solve:"Risolvi", wait:"Aspetta...", solved:"Risolto in ", moves:" mosse!", tooComplex:"Troppo complesso...",
					helpTitle:"Scorciatoie da Tastiera", helpHint:"Premi ? per chiudere",
					helpShortcuts:[["↑","Sposta il tassello in basso"],["↓","Sposta il tassello in alto"],["←","Sposta il tassello a destra"],["→","Sposta il tassello a sinistra"],["R","Mescola / ricomincia"],["S","Risoluzione automatica"],["L","Lingua successiva"],["?","Mostra / nascondi questa guida"]] },
				fr: { shuffle:"Mélanger", solve:"Résoudre", wait:"Patientez...", solved:"Résolu en ", moves:" coups!", tooComplex:"Trop complexe...",
					helpTitle:"Raccourcis Clavier", helpHint:"Appuyez sur ? pour fermer",
					helpShortcuts:[["↑","Déplacer la tuile vers le bas"],["↓","Déplacer la tuile vers le haut"],["←","Déplacer la tuile vers la droite"],["→","Déplacer la tuile vers la gauche"],["R","Mélanger / recommencer"],["S","Résolution automatique"],["L","Langue suivante"],["?","Afficher / masquer cette aide"]] },
				es: { shuffle:"Mezclar", solve:"Resolver", wait:"Espera...", solved:"Resuelto en ", moves:" movimientos!", tooComplex:"Demasiado complejo...",
					helpTitle:"Atajos de Teclado", helpHint:"Pulsa ? para cerrar",
					helpShortcuts:[["↑","Mover ficha hacia abajo"],["↓","Mover ficha hacia arriba"],["←","Mover ficha hacia la derecha"],["→","Mover ficha hacia la izquierda"],["R","Mezclar / reiniciar"],["S","Resolución automática"],["L","Siguiente idioma"],["?","Mostrar / ocultar esta ayuda"]] },
				de: { shuffle:"Mischen", solve:"Lösen", wait:"Warte...", solved:"Gelöst in ", moves:" Zügen!", tooComplex:"Zu komplex...",
					helpTitle:"Tastaturkürzel", helpHint:"? drücken zum Schließen",
					helpShortcuts:[["↑","Stein nach unten schieben"],["↓","Stein nach oben schieben"],["←","Stein nach rechts schieben"],["→","Stein nach links schieben"],["R","Mischen / neu starten"],["S","Automatisch lösen"],["L","Nächste Sprache"],["?","Hilfe ein-/ausblenden"]] },
				pt: { shuffle:"Embaralhar", solve:"Resolver", wait:"Aguarde...", solved:"Resolvido em ", moves:" movimentos!", tooComplex:"Complexo demais...",
					helpTitle:"Atalhos de Teclado", helpHint:"Prima ? para fechar",
					helpShortcuts:[["↑","Mover peça para baixo"],["↓","Mover peça para cima"],["←","Mover peça para a direita"],["→","Mover peça para a esquerda"],["R","Embaralhar / reiniciar"],["S","Resolução automática"],["L","Próximo idioma"],["?","Mostrar / ocultar esta ajuda"]] },
				ro: { shuffle:"Amestecă", solve:"Rezolvă", wait:"Așteaptă...", solved:"Rezolvat în ", moves:" mutări!", tooComplex:"Prea complex...",
					helpTitle:"Comenzi Rapide", helpHint:"Apăsați ? pentru a închide",
					helpShortcuts:[["↑","Mută piesa în jos"],["↓","Mută piesa în sus"],["←","Mută piesa la dreapta"],["→","Mută piesa la stânga"],["R","Amestecă / repornește"],["S","Rezolvare automată"],["L","Limba următoare"],["?","Arată / ascunde ajutorul"]] },
				uk: { shuffle:"Перемішати", solve:"Вирішити", wait:"Зачекайте...", solved:"Вирішено за ", moves:" ходів!", tooComplex:"Занадто складно...",
					helpTitle:"Клавіатурні Скорочення", helpHint:"Натисніть ? щоб закрити",
					helpShortcuts:[["↑","Зсунути плитку вниз"],["↓","Зсунути плитку вгору"],["←","Зсунути плитку вправо"],["→","Зсунути плитку вліво"],["R","Перемішати / перезапустити"],["S","Автовирішення"],["L","Наступна мова"],["?","Показати / приховати довідку"]] },
				el: { shuffle:"Ανακάτεμα", solve:"Επίλυση", wait:"Περιμένετε...", solved:"Λύθηκε σε ", moves:" κινήσεις!", tooComplex:"Πολύ πολύπλοκο...",
					helpTitle:"Συντομεύσεις Πληκτρολογίου", helpHint:"Πατήστε ? για κλείσιμο",
					helpShortcuts:[["↑","Μετακίνηση πλακιδίου κάτω"],["↓","Μετακίνηση πλακιδίου πάνω"],["←","Μετακίνηση πλακιδίου δεξιά"],["→","Μετακίνηση πλακιδίου αριστερά"],["R","Ανακάτεμα / επανεκκίνηση"],["S","Αυτόματη επίλυση"],["L","Επόμενη γλώσσα"],["?","Εμφάνιση / απόκρυψη βοήθειας"]] },
				la: { shuffle:"Misce", solve:"Solve", wait:"Expecta...", solved:"Solutum in ", moves:" motibus!", tooComplex:"Nimis complexum...",
					helpTitle:"Claves Auxiliares", helpHint:"Preme ? ad claudendum",
					helpShortcuts:[["↑","Move tesseram deorsum"],["↓","Move tesseram sursum"],["←","Move tesseram dextrorsum"],["→","Move tesseram sinistrorsum"],["R","Misce / renoua"],["S","Solve automatice"],["L","Muta linguam"],["?","Ostende / absconde auxilium"]] },
				zh: { shuffle:"打乱", solve:"求解", wait:"请稍候...", solved:"用 ", moves:" 步解决！", tooComplex:"太复杂了...",
					helpTitle:"键盘快捷键", helpHint:"按 ? 关闭",
					helpShortcuts:[["↑","向下移动方块"],["↓","向上移动方块"],["←","向右移动方块"],["→","向左移动方块"],["R","打乱 / 重新开始"],["S","自动求解"],["L","切换语言"],["?","显示 / 隐藏帮助"]] },
				ja: { shuffle:"シャッフル", solve:"解く", wait:"お待ちください...", solved:"", moves:" 手で解けた！", tooComplex:"複雑すぎます...",
					helpTitle:"キーボードショートカット", helpHint:"? を押して閉じる",
					helpShortcuts:[["↑","タイルを下に移動"],["↓","タイルを上に移動"],["←","タイルを右に移動"],["→","タイルを左に移動"],["R","シャッフル / リスタート"],["S","自動解決"],["L","次の言語"],["?","このヘルプを表示 / 非表示"]] }
			};
			let currentLangIndex = 0;

			function t(key){
				return TRANSLATIONS[LANG_KEYS[currentLangIndex]][key];
			}

			function nextLanguage(){
				currentLangIndex = (currentLangIndex + 1)%(LANG_KEYS.length);
				const flagBtn = document.getElementById("langBtn");
				if(flagBtn){
					flagBtn.innerHTML = FLAGS_SVG[currentLangIndex];
				}
				document.getElementById("shuffleBtn").innerHTML = t("shuffle");
				const solveBtn = document.getElementById("solveBtn");
				if(!solveBtn.disabled){
					solveBtn.innerHTML = t("solve");
				}
				buildHelpModal();
			}

			function buildHelpModal(){
				const tr = TRANSLATIONS[LANG_KEYS[currentLangIndex]];
				document.getElementById("helpTitle").textContent = tr.helpTitle;
				document.getElementById("helpHint").textContent = tr.helpHint;
				const table = document.getElementById("helpTable");
				table.innerHTML = "";
				tr.helpShortcuts.forEach(([key, desc]) => {
					const row = document.createElement("tr");
					row.innerHTML = `<td><span class="help-key">${key}</span></td><td class="help-desc">${desc}</td>`;
					table.appendChild(row);
				});
			}

			function toggleHelp(){
				document.getElementById("helpOverlay").classList.toggle("show");
			}

			function closeHelp(e){
				if(e.target === document.getElementById("helpOverlay")){
					document.getElementById("helpOverlay").classList.remove("show");
				}
			}

			document.addEventListener("keydown", e => {
				if(e.key === "?"){
					toggleHelp();
				}else if(e.key.toLowerCase() === "r"){
					shuffleTiles();
				}else if(e.key.toLowerCase() === "l"){
					nextLanguage();
				}else if(e.key.toLowerCase() === "s"){
					solve();
				}else if(e.key === "ArrowUp"){
					e.preventDefault();
					if(r1 < 3){
						cursorX = (c1*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						cursorY = ((r1 + 1)*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						select();
					}
				}else if(e.key === "ArrowDown"){
					e.preventDefault();
					if(r1 > 0){
						cursorX = (c1*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						cursorY = ((r1 - 1)*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						select();
					}
				}else if(e.key === "ArrowLeft"){
					e.preventDefault();
					if(c1 < 3){
						cursorX = ((c1 + 1)*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						cursorY = (r1*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						select();
					}
				}else if(e.key === "ArrowRight"){
					e.preventDefault();
					if(c1 > 0){
						cursorX = ((c1 - 1)*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						cursorY = (r1*(SIDE + DIVISION_WIDTH)) + BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + SIDE/2;
						select();
					}
				}
			});

			function drawBoard(){
				const container = document.getElementById("Fifteen");
				for(let i = 0; i < 16; i++){
					const div = document.createElement("div");
					div.id = IDS[i];
					div.className = "tile-container";
					container.appendChild(div);
				}
				let board = document.getElementById("board");
				board.width = WIDTH;
				board.height = HEIGHT;
				if(board.getContext("2d")){
					let ctx = board.getContext("2d");
					ctx.fillStyle = BORDER_COLOR;
					ctx.fillRect(MARGIN_DIM, MARGIN_DIM, (SIDE*4) + (DIVISION_WIDTH*5) + (BORDER_WIDTH*2), (SIDE*4) + (DIVISION_WIDTH*5) + (BORDER_WIDTH*2));
					ctx.fillStyle = FRAME_COLOR;
					ctx.fillRect(MARGIN_DIM + BORDER_WIDTH, MARGIN_DIM + BORDER_WIDTH, (SIDE*4) + (DIVISION_WIDTH*5), (SIDE*4) + (DIVISION_WIDTH*5));
				}
				const handleInput = (e) => {
					const rect = board.getBoundingClientRect();
					const clientX = e.touches ? e.touches[0].clientX : e.clientX;
					const clientY = e.touches ? e.touches[0].clientY : e.clientY;
					cursorX = clientX - rect.left;
					cursorY = clientY - rect.top;
					select();
				};
				board.onclick = handleInput;
				board.ontouchstart = (e) => {
					handleInput(e);
					e.preventDefault();
				};
				createButtons();
				shuffleTiles();
			}

			function createButtons(){
				const oldContainer = document.getElementById("controls");
				if(oldContainer){
					oldContainer.remove();
				}
				const container = document.createElement("div");
				container.id = "controls";
				const boardWidth = (SIDE*4) + (DIVISION_WIDTH*5) + (BORDER_WIDTH*2);
				const boardStartX = MARGIN_DIM;
				const boardBottomY = MARGIN_DIM + boardWidth;
				container.style.left = boardStartX + "px";
				container.style.top = (boardBottomY + (UNIT*5)) + "px";
				container.style.width = boardWidth + "px";
				container.style.gap = UNIT + "px";
				const btnData = [
					{id: "shuffleBtn", txt: t("shuffle"), click: "shuffleTiles()"},
					{id: "langBtn", txt: FLAGS_SVG[currentLangIndex], click: "nextLanguage()"},
					{id: "solveBtn", txt: t("solve"), click: "solve()"}
				];
				btnData.forEach(b => {
					let btn = document.createElement("button");
					btn.id = b.id;
					btn.className = "game-btn";
					btn.innerHTML = b.txt;
					btn.setAttribute("onclick", b.click);
					btn.style.padding = (UNIT*1.5) + "px 0";
					btn.style.fontSize = (UNIT*3.2) + "px";
					btn.style.boxShadow = `0px ${UNIT/2}px 0px rgba(0,0,0,0.1)`;
					container.appendChild(btn);
				});
				document.getElementById("Fifteen").appendChild(container);
			}

			function drawTile(row, column, tile){
				let val = parseInt(tile, 16);
				let board = document.getElementById("board");
				let ctx = board.getContext("2d");
				let color = (tile === "0") ? BORDER_COLOR : (((val + Math.floor((val - 1)/4))%2 === 1) ? COLOR_1 : COLOR_2);
				let posX = BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + (column*(SIDE + DIVISION_WIDTH));
				let posY = BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM + (row*(SIDE + DIVISION_WIDTH));
				ctx.fillStyle = color;
				ctx.fillRect(posX, posY, SIDE, SIDE);
				let targetId = ((row*4 + column + 1)%16).toString(16);
				const el = document.getElementById(targetId);
				if(el){
					el.textContent = (tile === "0") ? "" : val;
					el.style.left = posX + "px";
					el.style.top = posY + "px";
				}
			}

			function swapTiles(t1, t2){
				const el1 = document.getElementById(t1), el2 = document.getElementById(t2);
				let v1 = el1.textContent, v2 = el2.textContent;
				let idx1 = (parseInt(t1, 16) + 15)%16, idx2 = (parseInt(t2, 16) + 15)%16;
				drawTile(Math.floor(idx1/4), idx1%4, (v2 === "" ? "0" : parseInt(v2).toString(16)));
				drawTile(Math.floor(idx2/4), idx2%4, (v1 === "" ? "0" : parseInt(v1).toString(16)));
				begun = true;
			}

			function select(){
				if(gameFinished || isSolving){
					return;
				}
				let r = Math.floor((cursorY - (BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM))/(SIDE + DIVISION_WIDTH));
				let c = Math.floor((cursorX - (BORDER_WIDTH + DIVISION_WIDTH + MARGIN_DIM))/(SIDE + DIVISION_WIDTH));
				if(r >= 0 && r < 4 && c >= 0 && c < 4 && (Math.abs(r - r1) + Math.abs(c - c1)) === 1){
					swapTiles(((4*r + c + 1)%16).toString(16), ((4*r1 + c1 + 1)%16).toString(16));
					r1 = r;
					c1 = c;
					counterMoves++;
					if(begun && checkWin()){
						gameFinished = true;
						document.body.style.background = WINNING_COLOR;
						setTimeout(() => alert(t("solved") + counterMoves + t("moves")), 100);
					}
				}
			}

			function checkWin(){
				for(let i = 0; i < 15; i++){
					if(document.getElementById(((i + 1)%16).toString(16)).textContent !== String(i + 1)){
						return false;
					}
				}
				return true;
			}

			function shuffleTiles(){
				gameFinished = false;
				document.body.style.background = BACKGROUND_COLOR;
				let s = "123456789abcdef0".split('');
				do{
					for(let i = s.length - 1; i > 0; i--){
						const j = Math.floor(Math.random()*(i + 1));
						[s[i], s[j]] = [s[j], s[i]];
					}
				}while(!isSolvable(s));
				s.forEach((id, i) => drawTile(Math.floor(i/4), i%4, id));
				let zIdx = s.indexOf("0");
				r1 = Math.floor(zIdx/4);
				c1 = zIdx%4;
				counterMoves = 0;
				begun = false;
			}

			function isSolvable(a){
				let inv = 0, zR = 0;
				for(let i = 0; i < 16; i++){
					if(a[i] === "0"){
						zR = Math.floor(i/4);
						continue;
					}
					for(let j = i + 1; j < 16; j++){
						inv += (a[j] !== "0" && parseInt(a[i], 16) > parseInt(a[j], 16)) ? 1 : 0;
					}
				}
				return (zR%2 === 0) ? (inv%2 !== 0) : (inv%2 === 0);
			}

			function solve(){
				if(isSolving || gameFinished){
					return;
				}
				const btn = document.getElementById("solveBtn");
				btn.innerHTML = t("wait");
				btn.disabled = true;
				isSolving = true;
				let state = [];
				for(let i = 0; i < 16; i++){
					let val = document.getElementById(((i + 1)%16).toString(16)).textContent;
					state.push(val === "" ? 0 : parseInt(val));
				}
				setTimeout(() => {
					let path = getFastPath(state);
					if(path){
						animate(path);
					}else{
						alert(t("tooComplex"));
						resetUI();
					}
				}, 50);
			}

			function getHeuristic(s){
				let d = 0;
				for(let i = 0; i < 16; i++){
					if(s[i] === 0){
						continue;
					}
					d += Math.abs(Math.floor(i/4) - Math.floor((s[i] - 1)/4)) + Math.abs((i%4) - ((s[i] - 1)%4));
				}
				return d;
			}

			function getFastPath(state){
				let bound = getHeuristic(state);
				let path = [], startTime = Date.now();
				while(Date.now() - startTime < 3000){
					let t = search(state, 0, bound, path, state.indexOf(0), "");
					if(t === "FOUND"){
						return path;
					}
					bound = t + 2;
				}
				return null;
			}

			function search(s, g, bound, path, z, prev){
				let h = getHeuristic(s);
				if(g + h*1.5 > bound){
					return g + h*1.5;
				}
				if(h === 0){
					return "FOUND";
				}
				let min = Infinity, r = Math.floor(z/4), c = z%4;
				let moves = [];
				if(r > 0 && prev !== "D"){
					moves.push({d: "U", i: z - 4 });
				}
				if(r < 3 && prev !== "U"){
					moves.push({d: "D", i: z + 4 });
				}
				if(c > 0 && prev !== "R"){
					moves.push({d: "L", i: z - 1 });
				}
				if(c < 3 && prev !== "L"){
					moves.push({d: "R", i: z + 1 });
				}
				for(let m of moves){
					[s[z], s[m.i]] = [s[m.i], s[z]];
					path.push(m.d);
					let t = search(s, g + 1, bound, path, m.i, m.d);
					if(t === "FOUND"){
						return "FOUND";
					}
					if(t < min){
						min = t;
					}
					path.pop();
					[s[z], s[m.i]] = [s[m.i], s[z]];
				}
				return min;
			}

			function animate(moves){
				let i = 0;
				let timer = setInterval(() => {
					if(i >= moves.length){
						clearInterval(timer);
						gameFinished = true;
						document.body.style.background = WINNING_COLOR;
						resetUI();
						setTimeout(() => alert(t("solved") + counterMoves + t("moves")), 50);
						return;
					}
					let zIdx = r1*4 + c1, tIdx = zIdx + (moves[i] === "U" ? -4 : moves[i] === "D" ? 4 : moves[i] === "L" ? -1 : 1);
					swapTiles(((tIdx + 1)%16).toString(16), ((zIdx + 1)%16).toString(16));
					r1 = Math.floor(tIdx/4);
					c1 = tIdx%4;
					counterMoves++;
					i++;
				}, 180);
			}

			function resetUI(){
				isSolving = false;
				document.getElementById("solveBtn").innerHTML = t("solve");
				document.getElementById("solveBtn").disabled = false;
			}

			drawBoard();
			buildHelpModal();
		</script>
	</body>
</html>
