<!DOCTYPE HTML>
<html lang="en"><!--G03#007 - Luca - Tower of Hanoi-->
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Tower of Hanoi</title>
		<style>
			:root{
				--accent-color: #4a90e2;
				--button-hover: #357abd;
				--panel-bg: rgba(255, 255, 255, 0.85);
			}
			body{
				font-family: 'Segoe UI', Tahoma, sans-serif;
				background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
				background-attachment: fixed;
				text-align: center;
				display: flex;
				flex-direction: column;
				align-items: center;
				margin: 0;
				padding: 20px;
				min-height: 100vh;
				user-select: none;
				-webkit-user-select: none;
				touch-action: manipulation;
			}
			.top-bar{
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 15px;
			}
			.stats{
				background: var(--panel-bg);
				padding: 10px 25px;
				border-radius: 50px;
				font-weight: bold;
				font-size: 1.2em;
				box-shadow: 0 4px 10px rgba(0,0,0,0.1);
				color: #333;
				display: flex;
				align-items: center;
			}
			.stats span{
				margin-left: 8px;
			}
			canvas{
				background: rgba(255, 255, 255, 0.2);
				cursor: pointer;
				display: block;
				margin: 10px auto;
				max-width: 100%;
				height: auto;
				border-radius: 15px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
				border: 2px solid rgba(255, 255, 255, 0.4);
				touch-action: none;
				-webkit-tap-highlight-color: transparent;
			}
			.controls{
				background: var(--panel-bg);
				padding: 15px 25px;
				border-radius: 12px;
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 15px;
				box-shadow: 0 4px 15px rgba(0,0,0,0.05);
			}
			select, button{
				padding: 10px 20px;
				font-size: 14px;
				border-radius: 8px;
				border: none;
				cursor: pointer;
				transition: all 0.2s ease;
				outline: none;
			}
			select{
				background: var(--panel-bg);
				border: 1px solid rgba(255,255,255,0.5);
				box-shadow: 0 4px 10px rgba(0,0,0,0.1);
				font-weight: bold;
				height: 44px;
			}
			button{
				background-color: var(--accent-color);
				color: white;
				font-weight: bold;
				text-transform: uppercase;
			}
			button:hover{
				background-color: var(--button-hover);
				transform: translateY(-2px);
			}
			.flag-svg{
				width: 32px;
				height: 20px;
				display: inline-block;
				vertical-align: middle;
				border: 1px solid rgba(255,255,255,0.5);
				border-radius: 2px;
			}
			*{
				-webkit-tap-highlight-color: transparent;
			}
			@media screen and (max-width: 600px){
				.controls{
					width: 90%;
				}
			}
			#helpOverlay{
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0,0,0,0.55);
				z-index: 1000;
				justify-content: center;
				align-items: center;
			}
			#helpOverlay.visible{
				display: flex;
			}
			#helpBox{
				background: #fff;
				border-radius: 12px;
				box-shadow: 0 8px 32px rgba(0,0,0,0.35);
				padding: 28px 32px 24px;
				max-width: 480px;
				width: 90%;
				max-height: 85vh;
				overflow-y: auto;
				position: relative;
				text-align: left;
			}
			#helpBox h2{
				margin: 0 0 18px;
				font-size: 1.3em;
				text-align: center;
				color: #4a90e2;
			}
			#helpBox table{
				width: 100%;
				border-collapse: collapse;
			}
			#helpBox td{
				padding: 7px 10px;
				vertical-align: top;
			}
			#helpBox tr:nth-child(even) td{
				background: #f4f4f4;
				border-radius: 4px;
			}
			#helpBox .key{
				font-family: monospace;
				font-weight: bold;
				font-size: 1.05em;
				color: #e2574a;
				white-space: nowrap;
				width: 1%;
			}
			#helpCloseBtn{
				position: absolute;
				top: 12px;
				right: 16px;
				background: none;
				border: none;
				font-size: 1.5em;
				cursor: pointer;
				color: #555;
				padding: 2px 6px;
				line-height: 1;
			}
			#helpCloseBtn:hover{
				color: #000;
			}
		</style>
	</head>
	<body>
		<div class="top-bar">
			<select id="disksNumber" onchange="changeDiskCount()"></select>
			<div class="stats"><span id="movesLabel">Moves:</span> <span id="moveCounter">0</span></div>
		</div>
		<div id="helpOverlay" role="dialog" aria-modal="true" onclick="if(event.target===this){closeHelp();}">
			<div id="helpBox">
				<button id="helpCloseBtn" onclick="closeHelp()" aria-label="Close">✕</button>
				<h2 id="helpTitle">Keyboard Shortcuts</h2>
				<table id="helpTable"></table>
			</div>
		</div>
		<canvas id="universe"></canvas>
		<div class="controls">
			<button type="button" id="restartBtn" onclick="resetGame()">⟳</button>
			<button type="button" id="demoBtn" onclick="animatedSolving()">Solve</button>
			<button type="button" id="langBtn" onclick="nextLanguage()"></button>
		</div>
		<script>
			const FLAGS_SVG = [
				'<svg class="flag-svg" viewBox="0 0 60 30"><clipPath id="s"><path d="M0,0 v30 h60 v-30 z"/></clipPath><path d="M0,0 v30 h60 v-30 z" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#s)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></svg>', // UK
				//'<svg class="flag-svg" viewBox="0 0 7410 3900"><rect width="7410" height="3900" fill="#b22234"/><path d="M0 300h7410M0 900h7410M0 1500h7410M0 2100h7410M0 2700h7410M0 3300h7410" stroke="#fff" stroke-width="300"/><rect width="2964" height="2100" fill="#3c3b6e"/><path d="M247 175l247 759-646-469h798l-646 469z" fill="#fff" transform="scale(.2)"/></svg>', // US
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#008d46"/><rect width="1" height="2" x="1" fill="#f4f5f0"/><rect width="1" height="2" x="2" fill="#d2232c"/></svg>', // IT
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#002395"/><rect width="1" height="2" x="1" fill="#fff"/><rect width="1" height="2" x="2" fill="#ed2939"/></svg>', // FR
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#c60b1e"/><rect width="3" height="1" y="0.5" fill="#ffc400"/></svg>', // ES
				'<svg class="flag-svg" viewBox="0 0 5 3"><rect width="5" height="3"/><rect width="5" height="2" y="1" fill="#d00"/><rect width="5" height="1" y="2" fill="#ffce00"/></svg>', // DE
				'<svg class="flag-svg" viewBox="0 0 600 400"><rect width="240" height="400" fill="#006600"/><rect x="240" width="360" height="400" fill="#ff0000"/></svg>', // PT
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#002b7f"/><rect width="1" height="2" x="1" fill="#fcd116"/><rect width="1" height="2" x="2" fill="#ce1126"/></svg>', // RO
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="1" fill="#0057b7"/><rect width="3" height="1" y="1" fill="#ffd700"/></svg>', // UA
				'<svg class="flag-svg" viewBox="0 0 27 18"><rect width="27" height="18" fill="#005bae"/><path d="M0 2h27M0 6h27M0 10h27M0 14h27" stroke="#fff" stroke-width="2"/><rect width="10" height="10" fill="#005bae"/><path d="M5 0v10M0 5h10" stroke="#fff" stroke-width="2"/></svg>', // GR
				//'<svg class="flag-svg" viewBox="0 0 1 1"><rect width="0.5" height="1" fill="#ffe000"/><rect x="0.5" width="0.5" height="1" fill="#fff"/></svg>', // VA
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#800000"/><path d="M0.5,0.5 L2.5,0.5 L2.5,1.5 L0.5,1.5 Z" fill="none" stroke="#FFD700" stroke-width="0.1"/><text x="1.5" y="1.15" font-family="serif" font-weight="bold" font-size="0.4" fill="#FFD700" text-anchor="middle">SPQR</text></svg>', // ROMA
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#de2110"/><path d="M.5 1.1l.3-.9.3.9-1-.6h1z" fill="#ffde00" transform="matrix(.4 0 0 .4 .1 .1)"/></svg>', // CN
				'<svg class="flag-svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><circle cx="1.5" cy="1" r="0.6" fill="#bc002d"/></svg>' // JP
			];
			const LANG_KEYS = ['en','it','fr','es','de','pt','ro','uk','el','la','zh','ja'];
			const TRANSLATIONS = {
				en: { restart:"Restart", demo:"Solve", level:"Level", moves:"Moves", win:"Wonderful! :-D You win in ", move:"move", moves_pl:"moves" },
				it: { restart:"Ricomincia", demo:"Risolvi", level:"Livello", moves:"Mosse", win:"Fantastico! :-D Hai vinto in ", move:"mossa", moves_pl:"mosse" },
				fr: { restart:"Recommencer", demo:"Résoudre", level:"Niveau", moves:"Coups", win:"Magnifique ! :-D Tu gagnes en ", move:"coup", moves_pl:"coups" },
				es: { restart:"Reiniciar", demo:"Resolver", level:"Nivel", moves:"Movimientos", win:"¡Maravilloso! :-D Ganaste en ", move:"movimiento", moves_pl:"movimientos" },
				de: { restart:"Neustart", demo:"Lösen", level:"Stufe", moves:"Züge", win:"Wunderbar! :-D Du gewinnst in ", move:"Zug", moves_pl:"Zügen" },
				pt: { restart:"Reiniciar", demo:"Resolver", level:"Nível", moves:"Movimentos", win:"Maravilhoso! :-D Você venceu em ", move:"movimento", moves_pl:"movimentos" },
				ro: { restart:"Repornire", demo:"Rezolvă", level:"Nivel", moves:"Mutări", win:"Minunat! :-D Ai câștigat în ", move:"mutare", moves_pl:"mutări" },
				uk: { restart:"Перезапуск", demo:"Вирішити", level:"Рівень", moves:"Ходи", win:"Чудово! :-D Ви виграли за ", move:"хід", moves_pl:"ходів" },
				el: { restart:"Επανεκκίνηση", demo:"Επίλυση", level:"Επίπεδο", moves:"Κινήσεις", win:"Υπέροχα! :-D Κερδίσατε σε ", move:"κίνηση", moves_pl:"κινήσεις" },
				la: { restart:"Restitue", demo:"Solve", level:"Gradus", moves:"Motus", win:"Mirabile! :-D Vicisti in ", move:"motu", moves_pl:"motibus" },
				zh: { restart:"重新开始", demo:"求解", level:"等级", moves:"步数", win:"太棒了！:-D 你用 ", move:"步", moves_pl:"步" },
				ja: { restart:"リスタート", demo:"解く", level:"レベル", moves:"手数", win:"素晴らしい！:-D ", move:"手で勝利！", moves_pl:"手で勝利！" }
			};
			const HELP_TITLE = {
				en:"Keyboard Shortcuts", it:"Tasti di scelta rapida", fr:"Raccourcis clavier",
				es:"Atajos de teclado", de:"Tastenkürzel", pt:"Atalhos de teclado",
				ro:"Scurtături de tastatură", uk:"Клавіші швидкого доступу",
				el:"Συντομεύσεις πληκτρολογίου", la:"Clavium compendia",
				zh:"键盘快捷键", ja:"キーボードショートカット"
			};
			const HELP_SHORTCUTS = {
				en:[["R","Restart the game"],["S","Watch the automatic solution"],["L","Switch language"],["?","Show / hide this help"]],
				it:[["R","Ricomincia la partita"],["S","Guarda la soluzione automatica"],["L","Cambia lingua"],["?","Mostra / nascondi questo aiuto"]],
				fr:[["R","Recommencer la partie"],["S","Voir la solution automatique"],["L","Changer de langue"],["?","Afficher / masquer cette aide"]],
				es:[["R","Reiniciar la partida"],["S","Ver la solución automática"],["L","Cambiar idioma"],["?","Mostrar / ocultar esta ayuda"]],
				de:[["R","Spiel neu starten"],["S","Automatische Lösung ansehen"],["L","Sprache wechseln"],["?","Hilfe anzeigen / ausblenden"]],
				pt:[["R","Reiniciar o jogo"],["S","Ver a solução automática"],["L","Mudar idioma"],["?","Mostrar / ocultar esta ajuda"]],
				ro:[["R","Repornește jocul"],["S","Urmărește soluția automată"],["L","Schimbă limba"],["?","Afișează / ascunde această ajutor"]],
				uk:[["R","Перезапустити гру"],["S","Переглянути автоматичне рішення"],["L","Змінити мову"],["?","Показати / приховати цю довідку"]],
				el:[["R","Επανεκκίνηση παιχνιδιού"],["S","Δείτε την αυτόματη λύση"],["L","Αλλαγή γλώσσας"],["?","Εμφάνιση / απόκρυψη βοήθειας"]],
				la:[["R","Ludum restitue"],["S","Solutionem automaticam vide"],["L","Linguam muta"],["?","Auxilium ostende / absconde"]],
				zh:[["R","重新开始游戏"],["S","观看自动解法"],["L","切换语言"],["?","显示 / 隐藏帮助"]],
				ja:[["R","ゲームを再スタート"],["S","自動解法を見る"],["L","言語を切替"],["?","ヘルプを表示 / 非表示"]]
			};
			let currentLangIndex = 0;

			function tr(key){
				return TRANSLATIONS[LANG_KEYS[currentLangIndex]][key];
			}

			function nextLanguage(){
				currentLangIndex = (currentLangIndex + 1)%LANG_KEYS.length;
				applyTranslation();
				if(document.getElementById('helpOverlay').classList.contains('visible')){
					updateHelpContent();
				}
			}

			function openHelp(){
				updateHelpContent();
				document.getElementById("helpOverlay").classList.add("visible");
			}

			function closeHelp(){
				document.getElementById("helpOverlay").classList.remove("visible");
			}

			function updateHelpContent(){
				const lang = LANG_KEYS[currentLangIndex];
				document.getElementById("helpTitle").textContent = HELP_TITLE[lang];
				document.getElementById("helpTable").innerHTML = HELP_SHORTCUTS[lang].map(([k,d]) => `<tr><td class="key">${k}</td><td>${d}</td></tr>`).join("");
			}

			function applyTranslation(){
				document.getElementById("langBtn").innerHTML = FLAGS_SVG[currentLangIndex];
				document.getElementById("restartBtn").textContent = "⟳";
				document.getElementById("demoBtn").textContent = tr("demo");
				document.getElementById("movesLabel").textContent = tr("moves") + ":";
				const select = document.getElementById("disksNumber");
				const current = select.value;
				select.innerHTML = "";
				for(let i = 1; i <= 10; i++){
					let opt = document.createElement("option");
					opt.value = i;
					opt.text = tr("level") + " " + i;
					if(String(i) === String(current)){
						opt.selected = true;
					}
					select.add(opt);
				}
			}

			const AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();

			function playTone(freq, type, duration){
				if(AUDIO_CTX.state === 'suspended'){
					AUDIO_CTX.resume();
				}
				const osc = AUDIO_CTX.createOscillator();
				const gain = AUDIO_CTX.createGain();
				osc.type = type;
				osc.frequency.setValueAtTime(freq, AUDIO_CTX.currentTime);
				gain.gain.setValueAtTime(0.1, AUDIO_CTX.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.0001, AUDIO_CTX.currentTime + duration);
				osc.connect(gain);
				gain.connect(AUDIO_CTX.destination);
				osc.start();
				osc.stop(AUDIO_CTX.currentTime + duration);
			}

			const DESKTOP = !(/Mobi|Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i).test(navigator.userAgent);
			const UNIT = DESKTOP ? 9 : 7;
			const H_SPACE = 8*UNIT, V_SPACE = 6*UNIT;
			const WIDTH = 36*UNIT;
			const PAGE_WIDTH = 3.5*UNIT;
			const BASE_HEIGHT = 2.5*UNIT;
			const DISK_INCREASE = 3*UNIT;
			const DISK_BASE_LENGTH = 12*UNIT;
			const DISK_HEIGHT = (DESKTOP ? 5 : 8)*UNIT;
			const UPPER_MARGIN = 4*UNIT, UPPER_PAGE_MARGIN = 2*UNIT, LOWER_MARGIN = 2*UNIT;
			const TOTAL_WIDTH = (3*WIDTH) + (4*H_SPACE);
			const BROWN = "#8D6E63", ORANGE = "#FFCA28";
			const COLORS = ["#FF0000", "#00FF00", "#0000FF", "#FFFF00", "#FF00FF", "#00FFFF", "#FF8000", "#8000FF", "#008000", "#333333"];
			let numberOfDisks = 4;
			let moves = 0;
			let universe, context, nIntervId = null;
			let towers = [[], [], []], selectedTower = [false, false, false];
			let activeTower = -1, wan = false, demo = false, steps = "", step = 0;
			let cursorX = 0;
			let totalHeight, pegHeight;

			window.onload = function(){
				applyTranslation();
				initGame();
			};

			function initGame(){
				universe = document.getElementById("universe");
				context = universe.getContext("2d");
				const handleInteraction = (e) => {
					const rect = universe.getBoundingClientRect();
					const clientX = e.touches ? e.touches[0].clientX : e.clientX;
					const scaleX = universe.width/rect.width;
					cursorX = (clientX - rect.left)*scaleX;
					selectTowerClick();
					if(e.touches){
						e.preventDefault();
					}
				};
				universe.addEventListener('mousedown', handleInteraction);
				universe.addEventListener('touchstart', handleInteraction, {passive: false});
				resetGame();
			}

			function resetGame(){
				document.body.style.background = "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)";
				if(nIntervId){
					clearInterval(nIntervId);
					nIntervId = null;
				}
				moves = 0;
				updateMoveDisplay();
				pegHeight = numberOfDisks*DISK_HEIGHT + UPPER_PAGE_MARGIN;
				totalHeight = V_SPACE + UPPER_MARGIN + pegHeight + BASE_HEIGHT + LOWER_MARGIN;
				universe.width = TOTAL_WIDTH;
				universe.height = totalHeight;
				wan = false;
				demo = false;
				activeTower = -1;
				towers = [[], [], []];
				selectedTower = [false, false, false];
				for(let i = 0; i < numberOfDisks; i++){
					towers[0][i] = numberOfDisks - i - 1;
					towers[1][i] = -1;
					towers[2][i] = -1;
				}
				const select = document.getElementById("disksNumber");
				if(select.innerHTML === ""){
					for(let i = 1; i <= 10; i++){
						let opt = document.createElement("option");
						opt.value = i;
						opt.text = tr("level") + " " + i;
						if(i === numberOfDisks){
							opt.selected = true;
						}
						select.add(opt);
					}
				}
				steps = calculateSteps(numberOfDisks);
				step = 0;
				drawAll();
			}

			function updateMoveDisplay(){
				document.getElementById("moveCounter").innerText = moves;
			}

			function drawAll(){
				context.clearRect(0, 0, universe.width, universe.height);
				for(let i = 0; i < 3; i++){
					drawTower(i);
				}
			}

			function drawTower(idx){
				let x0 = H_SPACE + idx*(WIDTH + H_SPACE);
				context.fillStyle = selectedTower[idx] ? ORANGE : "rgba(0,0,0,0.06)";
				context.fillRect(x0, V_SPACE, WIDTH, totalHeight - V_SPACE);
				context.fillStyle = BROWN;
				context.fillRect(x0 + (WIDTH - PAGE_WIDTH)/2, V_SPACE + UPPER_MARGIN, PAGE_WIDTH, pegHeight);
				context.fillRect(x0 + 3*UNIT, V_SPACE + UPPER_MARGIN + pegHeight, WIDTH - 6*UNIT, BASE_HEIGHT);
				for(let i = 0; i < numberOfDisks; i++){
					let diskValue = towers[idx][i];
					if(diskValue >= 0){
						drawDisk(idx, numberOfDisks - i - 1, diskValue);
					}
				}
			}

			function drawDisk(tIdx, level, dSize){
				let w = DISK_BASE_LENGTH + dSize*DISK_INCREASE;
				let x0 = H_SPACE + tIdx*(WIDTH + H_SPACE);
				let x = x0 + (WIDTH - w)/2;
				let y = V_SPACE + level*DISK_HEIGHT + UPPER_MARGIN + UPPER_PAGE_MARGIN;
				let h = DISK_HEIGHT - 2;
				context.fillStyle = COLORS[dSize];
				context.strokeStyle = "#000000";
				context.lineWidth = 1.5;
				context.beginPath();
				if(context.roundRect){
					context.roundRect(x, y, w, h, h/2);
				}else{
					context.rect(x, y, w, h);
				}
				context.fill();
				context.stroke();
			}

			function selectTowerClick(){
				if(wan){
					return;
				}
				let towerIdx = -1;
				for(let i = 0; i < 3; i++){
					let xStart = H_SPACE + i*(WIDTH + H_SPACE);
					if(cursorX >= xStart && cursorX <= xStart + WIDTH){
						towerIdx = i;
						break;
					}
				}
				if(towerIdx === -1){
					return;
				}
				if(activeTower === -1){
					if(getLastDiskIndex(towerIdx) !== -1){
						activeTower = towerIdx;
						selectedTower[towerIdx] = true;
						playTone(440, 'sine', 0.1);
					}
				}else{
					if(activeTower === towerIdx){
						selectedTower[towerIdx] = false;
						activeTower = -1;
					}else{
						if(moveDisk(activeTower, towerIdx)){
							moves++;
							updateMoveDisplay();
							playTone(600, 'sine', 0.1);
						}else{
							playTone(150, 'triangle', 0.2);
						}
						selectedTower[activeTower] = false;
						activeTower = -1;
					}
				}
				drawAll();
				checkWin();
			}

			function moveDisk(from, to){
				let fromIdx = getLastDiskIndex(from);
				let toIdx = getLastDiskIndex(to);
				let diskToMove = towers[from][fromIdx];
				if(toIdx === -1 || diskToMove < towers[to][toIdx]){
					towers[from][fromIdx] = -1;
					towers[to][toIdx + 1] = diskToMove;
					return true;
				}
				return false;
			}

			function getLastDiskIndex(t){
				let idx = numberOfDisks - 1;
				while(idx >= 0 && towers[t][idx] === -1){
					idx--;
				}
				return idx;
			}

			function checkWin(){
				if(towers[1][numberOfDisks - 1] !== -1 || towers[2][numberOfDisks - 1] !== -1){
					wan = true;
					document.body.style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
					playTone(800, 'sine', 0.4);
					if(!demo){
						setTimeout(() => alert(tr("win") + moves + " " + (moves === 1 ? tr("move") : tr("moves_pl")) + "! :-D"), 200);
					}
				}
			}

			function changeDiskCount(){
				numberOfDisks = parseInt(document.getElementById("disksNumber").value);
				resetGame();
			}

			function calculateSteps(n){
				let movesList = [];
				function hanoi(num, from, to, aux){
					if(num === 1){
						movesList.push({f: from, t: to});
						return;
					}
					hanoi(num - 1, from, aux, to);
					movesList.push({f: from, t: to});
					hanoi(num - 1, aux, to, from);
				}
				hanoi(n, 0, 2, 1);
				return movesList;
			}

			function animatedSolving(){
				resetGame();
				demo = true;
				nIntervId = setInterval(() => {
					if(step < steps.length){
						let m = steps[step];
						moveDisk(m.f, m.t);
						moves++;
						updateMoveDisplay();
						drawAll();
						checkWin();
						step++;
						playTone(500, 'sine', 0.05);
					}else{
						clearInterval(nIntervId);
					}
				}, 500);
			}

			document.addEventListener("keydown", e => {
				if(e.key.toLowerCase() === "r"){
					resetGame();
				}else if(e.key.toLowerCase() === "s"){
					animatedSolving();
				}else if(e.key.toLowerCase() === "l"){
					nextLanguage();
				}else if(e.key === "?"){
					const ov = document.getElementById("helpOverlay");
					if(ov.classList.contains("visible")){
						closeHelp();
					}else{
						openHelp();
					}
				}
			});
		</script>
	</body>
</html>
