				max-height: 95vw;

				gap: 10px;
				width: 95%;
				max-width: 500px;
				box-sizing: border-box;
			}
			.button-group{
				display: flex;
				gap: 5px;
				width: 100%;
				justify-content: center;
			}
			button{
				padding: 12px 5px;
				font-size: 13px;
				font-weight: bold;
				cursor: pointer;
				border: 1px solid #666;
				border-radius: 8px;
				background: #fff;
				flex: 1;
				min-width: 0;
				transition: all 0.2s;
			}
			button:active{
				transform: scale(0.98);
				background: #eee;
			}
			#btnShowSolutions{
				background-color: #fff;
				border-color: #d4a017;
				color: #856404;
				width: 100%;
			}
			#solutionsContainer{
				width: 100%;
				margin-top: 20px;
				display: flex;
				flex-direction: column;
				gap: 15px;
			}

				background: white;

				border-radius: 8px;
				padding: 10px;
				box-shadow: 0 2px 5px rgba(0,0,0,0.05);
			}
			.solutions-grid{
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				justify-content: center;
				margin-top: 10px;
			}
			.mini-board{
				border: 1px solid #333;
				width: 64px;
				height: 64px;
				cursor: pointer;
			}
			h3{
				font-size: 1rem;
				margin: 5px 0;
				color: #444;
			}
			#btnLang .flag-svg{
				width: 28px;
				height: 19px;
				display: block;
				margin: 0 auto;
				pointer-events: none;
			}
			*{

			}
			.help-overlay{
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(0,0,0,0.45);
				z-index: 1000;
				align-items: center;
				justify-content: center;
			}
			.help-overlay.show{
				display: flex;
			}
			.help-modal{
				background: #fffde8;
				border-radius: 14px;
				box-shadow: 0 8px 32px rgba(0,0,0,0.25);
				padding: 24px 28px 20px 28px;
				max-width: 400px;
				width: 92%;
				position: relative;
				animation: fadeIn 0.18s ease;
			}
			@keyframes fadeIn{
				from{
					opacity:0;
					transform:scale(0.95);
				}
				to{
					opacity:1;
					transform:scale(1);
				}
			}
			.help-modal h4{
				color: #856404;
				margin: 0 0 16px 0;
				font-size: 1.1em;
				text-align: center;
				letter-spacing: 0.5px;
			}
			.help-close{
				position: absolute;
				top: 12px;
				right: 14px;
				background: none;
				border: none;
				font-size: 1.3em;
				color: #999;
				cursor: pointer;
				padding: 2px 6px;
				line-height: 1;
				border-radius: 4px;
				font-weight: bold;
			}
			.help-close:hover{
				background: #f5f0c0;
				color: #856404;
			}
			.help-table{
				width: 100%;
				border-collapse: collapse;
				font-size: 0.92em;
			}
			.help-table tr{

			.help-table tr:last-child{

			}
			.help-table td{

			.help-hint{

				return TRANSLATIONS[LANG_KEYS[currentLangIndex]][key];
			}

			const SEMAPHORE_ON_SVG = `<svg width="66" height="18" viewBox="0 0 66 18" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto;pointer-events:none"><rect x="0" y="0" width="66" height="18" rx="3" fill="#111"/><circle cx="9" cy="9" r="6" fill="#880000"/><circle cx="9" cy="9" r="4" fill="#ff2200"/><circle cx="9" cy="9" r="2" fill="#ff8888" opacity="0.6"/><circle cx="21" cy="9" r="6" fill="#880000"/><circle cx="21" cy="9" r="4" fill="#ff2200"/><circle cx="21" cy="9" r="2" fill="#ff8888" opacity="0.6"/><circle cx="33" cy="9" r="6" fill="#880000"/><circle cx="33" cy="9" r="4" fill="#ff2200"/><circle cx="33" cy="9" r="2" fill="#ff8888" opacity="0.6"/><circle cx="45" cy="9" r="6" fill="#880000"/><circle cx="45" cy="9" r="4" fill="#ff2200"/><circle cx="45" cy="9" r="2" fill="#ff8888" opacity="0.6"/><circle cx="57" cy="9" r="6" fill="#880000"/><circle cx="57" cy="9" r="4" fill="#ff2200"/><circle cx="57" cy="9" r="2" fill="#ff8888" opacity="0.6"/></svg>`;
			const SEMAPHORE_OFF_SVG = `<svg width="66" height="18" viewBox="0 0 66 18" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto;pointer-events:none"><rect x="0" y="0" width="66" height="18" rx="3" fill="#111"/><circle cx="9" cy="9" r="6" fill="#2a2a2a"/><circle cx="21" cy="9" r="6" fill="#2a2a2a"/><circle cx="33" cy="9" r="6" fill="#2a2a2a"/><circle cx="45" cy="9" r="6" fill="#2a2a2a"/><circle cx="57" cy="9" r="6" fill="#2a2a2a"/></svg>`;
			const SIZE_PLUS_SVG = `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto;pointer-events:none"><rect x="8" y="2" width="4" height="16" rx="2" fill="currentColor"/><rect x="2" y="8" width="16" height="4" rx="2" fill="currentColor"/></svg>`;
			const SIZE_MINUS_SVG = `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto;pointer-events:none"><rect x="2" y="8" width="16" height="4" rx="2" fill="currentColor"/></svg>`;

			function updateUI(){
				const lang = LANG_KEYS[currentLangIndex];
				const tr = TRANSLATIONS[lang];
				document.getElementById("semaphore").innerHTML = semaphoreFlag ? SEMAPHORE_ON_SVG : SEMAPHORE_OFF_SVG;
				document.getElementById("btnDifficulty").textContent = easy ? t("easy") : t("hard");
				document.getElementById("refreshBtn").textContent = t("reset");
				document.querySelectorAll(".button-group button")[3].innerHTML = SIZE_PLUS_SVG;
				document.querySelectorAll(".button-group button")[4].innerHTML = SIZE_MINUS_SVG;
				setQueensLimitButtonLabel();
				const showBtn = document.getElementById("btnShowSolutions");
				if(showBtn.textContent !== ""){
					const isHiding = showBtn.textContent.includes("Hide") ||
						showBtn.textContent === TRANSLATIONS[lang]["hideSolutions"] ||
						document.getElementById("solutionsContainer").innerHTML !== "";
					showBtn.textContent = isHiding ? t("hideSolutions") : t("showSolutions");
				}
				document.getElementById("btnLang").innerHTML = FLAGS_SVG[currentLangIndex];
				document.getElementById("helpTitle").textContent = tr.helpTitle;
				document.getElementById("helpHint").textContent = tr.helpHint;
				const table = document.getElementById("helpTable");
				table.innerHTML = "";
				tr.helpShortcuts.forEach(([key, desc]) => {
					const row = document.createElement("tr");
					row.innerHTML = `<td><span class="help-key">${key}</span></td><td class="help-desc">${desc}</td>`;
					table.appendChild(row);
				});
			}

			function nextLang(){
				currentLangIndex = (currentLangIndex + 1)%(LANG_KEYS.length);
				updateUI();
			}

			window.onload = init;

			window.onresize = () => {
				side = getScreenSize()/order;
				drawAll();
			};

			function init(){
				const canvas = document.getElementById("chessboard");
				canvas.addEventListener('mousedown', handleInput);
				canvas.addEventListener('touchstart', (e) => {
					e.preventDefault();
					handleInput(e.touches[0]);
				});
				document.getElementById("btnLang").innerHTML = FLAGS_SVG[0];
				document.querySelectorAll(".button-group button")[3].innerHTML = SIZE_PLUS_SVG;
				document.querySelectorAll(".button-group button")[4].innerHTML = SIZE_MINUS_SVG;
				drawChessboard();
			}

			function drawChessboard(){
				grid = Array.from({length: order}, () => Array.from({length: order}, () => ({occupied: false, underAttack: false})));
				document.getElementById("btnShowSolutions").style.display = (order === 8) ? "block" : "none";
				refresh();
			}

			function handleInput(e){
				const rect = document.getElementById("chessboard").getBoundingClientRect();
				const x = e.clientX - rect.left;
				const y = e.clientY - rect.top;
				select(x, y);
			}

			function select(x, y){
				let r = Math.floor(x/side), c = Math.floor(y/side);
				if(r<0 || r>=order || c<0 || c>=order || hasWon){
					return;
				}
				if(numberOfQueens < maxNumberOfTheQueens || grid[r][c].occupied){
					numberOfQueens += grid[r][c].occupied ? -1 : 1;
					grid[r][c].occupied = !grid[r][c].occupied;
					updateAttack();
					drawAll();
					checkWin();
					setQueensLimitButtonLabel();
				}
			}

			function drawAll(){
				const canvas = document.getElementById("chessboard");
				canvas.width = canvas.height = side*order;
				for(let i = 0; i < order; i++){
					for(let j = 0; j < order; j++){
						drawCell(i,j);
					}
				}
			}

			function drawCell(row, col){
				let ctx = document.getElementById("chessboard").getContext("2d");
				ctx.fillStyle = (row + col)%2 === 0 ? COLOR_1 : COLOR_2;
				ctx.fillRect(row*side, col*side, side, side);
				if(grid[row][col].occupied){
					drawCircle(ctx, row*side + side/2, col*side + side/2, side/3, SELECTED);
					drawCircle(ctx, row*side + side/2, col*side + side/2, side/6, QUEEN_CENTER_COLOR);
				}else if(easy && grid[row][col].underAttack){
					drawCircle(ctx, row*side + side/2, col*side + side/2, side/8, QUEEN_CENTER_COLOR);
				}
			}

			function drawCircle(ctx, x, y, r, color){
				ctx.fillStyle = color;
				ctx.beginPath();
				ctx.arc(x, y, r, 0, Math.PI*2);
				ctx.fill();
			}

			function updateAttack(){
				for(let i = 0; i < order; i++){
					for(let j = 0; j < order; j++){
						grid[i][j].underAttack = false;
					}
				}
				for(let r = 0; r < order; r++){
					for(let c = 0; c < order; c++){
						if(grid[r][c].occupied){
							for(let i = 0; i < order; i++){
								for(let j = 0; j < order; j++){
									if((r !== i || c !== j) && (r === i || c === j || Math.abs(r-i) === Math.abs(c-j))){
										grid[i][j].underAttack = true;
									}
								}
							}
						}
					}
				}
			}

			function checkWin(){
				let safe = true;
				for(let i = 0; i < order; i++){
					for(let j = 0; j < order; j++){
						if(grid[i][j].occupied && grid[i][j].underAttack){
							safe = false;
						}
					}
				}
				document.body.style.background = (!safe && semaphoreFlag) ? RED_SEMAPHORE_COLOR : BACKGROUND_COLOR;
				if(safe && numberOfQueens === order){
					document.body.style.background = BACKGROUND_WIN_COLOR;
					hasWon = true;
					setTimeout(() => alert(t("youWin")), 100);
				}
			}

			function toggleSolutions(){
				const container = document.getElementById("solutionsContainer");
				if(container.innerHTML !== ""){
					container.innerHTML = "";
					document.getElementById("btnShowSolutions").textContent = t("showSolutions");
					return;
				}
				solutions.forEach((fam, idx) => {
					let block = document.createElement("div");
					block.className = "solutions-block";
					let gridDiv = document.createElement("div");
					gridDiv.className = "solutions-grid";
					fam.forEach(sol => {
						let mini = document.createElement("canvas");
						mini.className = "mini-board";
						mini.width = mini.height = 64;
						drawMini(mini, sol);
						mini.onclick = () => {
							loadSolution(sol);
							window.scrollTo({top: 0, behavior: 'smooth'});
						};
						gridDiv.appendChild(mini);
					});
					block.appendChild(gridDiv);
					container.appendChild(block);
				});
				container.scrollIntoView({behavior: "smooth"});
				document.getElementById("btnShowSolutions").textContent = t("hideSolutions");
			}

			function drawMini(canvas, sol){
				let ctx = canvas.getContext("2d"), s = 8;
				for(let i = 0; i < 8; i++){
					for(let j = 0; j < 8; j++){
						ctx.fillStyle = (i + j)%2 === 0 ? "#eee" : "#999";
						ctx.fillRect(i*s, j*s, s, s);
					}
				}
				ctx.fillStyle = "red";
				for(let col = 0; col < 8; col++){
					ctx.beginPath();
					ctx.arc(col*s + 4, parseInt(sol[col])*s + 4, 2.5, 0, 7);
					ctx.fill();
				}
			}

			function loadSolution(sol){
				refresh();
				for(let col = 0; col < 8; col++){
					grid[col][parseInt(sol[col])].occupied = true;
				}
				numberOfQueens = 8;
				updateAttack();
				drawAll();
				setQueensLimitButtonLabel();
				document.body.style.background = "#add8e6";
				hasWon = false;
			}

			function refresh(){
				hasWon = false;
				numberOfQueens = 0;
				document.body.style.background = BACKGROUND_COLOR;
				maxNumberOfTheQueens = limited ? order : order*order;
				for(let i = 0; i < order; i++){
					for(let j = 0; j < order; j++){
						grid[i][j].occupied = false;
						grid[i][j].underAttack = false;
					}
				}
				drawAll();
				setQueensLimitButtonLabel();
				updateUI();
			}

			function setQueensLimitButtonLabel(){
				document.getElementById("queensNumber").textContent = `${t("queens")} ${numberOfQueens}/${maxNumberOfTheQueens}`;
			}

			function changeDifficulty(){
				easy = !easy;
				document.getElementById("btnDifficulty").textContent = easy ? t("easy") : t("hard");
				drawAll();
			}

			function changeFlagValue(){
				semaphoreFlag = !semaphoreFlag;
				document.getElementById("semaphore").innerHTML = semaphoreFlag ? SEMAPHORE_ON_SVG : SEMAPHORE_OFF_SVG;
				checkWin();
			}

			function changeTheMaxNumberOfTheQueens(){
				if(numberOfQueens <= order){
					limited = !limited;
					maxNumberOfTheQueens = limited ? order : order*order;
					setQueensLimitButtonLabel();
				}
			}

			function bigger(){
				document.getElementById("solutionsContainer").innerHTML = "";
				order++;
				if(limited){
					maxNumberOfTheQueens = order;
				}else{
					maxNumberOfTheQueens = order*order;
				}
				side = getScreenSize()/order;
				drawChessboard();
			}

			function smaller(){
				if(order > 1){
					document.getElementById("solutionsContainer").innerHTML = "";
					order--;
					if(limited){
						maxNumberOfTheQueens = order;
					}else{
						maxNumberOfTheQueens = order*order;
					}
					side = getScreenSize()/order;
					drawChessboard();
				}
			}

			function toggleHelp(){
				document.getElementById("helpOverlay").classList.toggle("show");
			}

			function closeHelp(e){
				if(e.target === document.getElementById("helpOverlay")){
					document.getElementById("helpOverlay").classList.remove("show");
				}
			}

			document.addEventListener("keydown", e => {
				if(e.key === "?"){
					toggleHelp();
				}else if(e.key.toLowerCase() === "s"){
					changeFlagValue();
				}else if(e.key.toLowerCase() === "d"){
					changeDifficulty();
				}else if(e.key.toLowerCase() === "r"){
					refresh();
				}else if(e.key.toLowerCase() === "+"){
					bigger();
				}else if(e.key.toLowerCase() === "-"){
					smaller();
				}else if(e.key.toLowerCase() === "l"){
					nextLang();
				}else if(e.key.toLowerCase() === "q"){
					changeTheMaxNumberOfTheQueens();
				}
			});
		</script>
	</body>
</html>
