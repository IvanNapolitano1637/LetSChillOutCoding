			:root{
				--bg: #0d0d12;
				--surface: #16161f;
				--surface2: #1e1e2a;
				--border: #2a2a3a;
				--accent: #00e5a0;
				--accent2: #7c6aff;
				--text: #e8e8f0;
				--muted: #6b6b85;
			}
			body.light-mode{
				--bg: #f0f2f5;
				--surface: #ffffff;
				--surface2: #e4e6eb;
				--border: #d8dadf;
				--accent: #00a372;
				--accent2: #5a4ad1;
				--text: #1c1e21;
				--muted: #65676b;
			}
			*{
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body{
				font-family: 'Syne', sans-serif;
				background: var(--bg);
				color: var(--text);
				min-height: 100vh;
				padding: 24px 16px 48px;
				transition: background-color 0.3s, color 0.3s;
				-webkit-user-select: none;
				-ms-user-select: none;
				user-select: none;
			}
			header{
				text-align: center;
				margin-bottom: 32px;
			}
			header h1{
				font-size: clamp(1.6rem, 5vw, 3rem);
				font-weight: 800;
				letter-spacing: -0.03em;
				background: linear-gradient(135deg, var(--accent), var(--accent2));
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				line-height: 1.1;
				margin-bottom: 8px;
			}
			header p{
				color: var(--muted);
				font-size: 0.9rem;
			}
			.search-container{
				max-width: 600px;
				margin: 0 auto 24px;
				position: relative;
			}
			.search-input{
				width: 100%;
				padding: 14px 20px;
				background: var(--surface);
				border: 2px solid var(--border);
				border-radius: 12px;
				color: var(--text);
				font-family: 'Syne', sans-serif;
				font-size: 1rem;
				outline: none;
				transition: border-color 0.2s, background-color 0.3s, color 0.3s;
			}
			.search-input:focus{
				border-color: var(--accent2);
			}
			.controls{
				position: fixed;
				bottom: 24px;
				right: 24px;
				display: flex;
				flex-direction: column;
				gap: 12px;
				z-index: 1000;
			}
			.fab{
				width: 50px;
				height: 50px;
				border-radius: 50%;
				border: none;
				color: white;
				cursor: pointer;
				box-shadow: 0 4px 15px rgba(0,0,0,0.3);
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 1.2rem;
				font-weight: bold;
				transition: transform 0.15s, box-shadow 0.15s;
			}
			.fab:hover{
				transform: scale(1.08);
				box-shadow: 0 6px 20px rgba(0,0,0,0.4);
			}
			#themeToggle{
				background: var(--accent2);
			}
			#langToggle{
				background: var(--accent);
				color: #000;
				font-size: 0.75rem;
				font-family: 'Space Mono', monospace;
				width: auto;
				min-width: 50px;
				padding: 0 10px;
				border-radius: 25px;
			}
			.filter-section{
				max-width: 1200px;
				margin: 0 auto 28px;
				display: flex;
				flex-direction: column;
				gap: 16px;
				align-items: center;
			}
			.filter-label{
				font-size: 0.7rem;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.1em;
				margin-bottom: -8px;
			}
			.filter-bar{
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				justify-content: center;
			}
			.filter-btn{
				background: var(--surface2);
				border: 1px solid var(--border);
				color: var(--muted);
				font-family: 'Syne', sans-serif;
				font-size: 0.72rem;
				font-weight: 700;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				padding: 6px 12px;
				border-radius: 999px;
				cursor: pointer;
				transition: border-color 0.2s, color 0.2s, background-color 0.2s;
			}
			.filter-btn:hover{
				border-color: var(--accent);
				color: var(--accent);
			}
			.filter-btn.active{
				background: var(--accent);
				border-color: var(--accent);
				color: #000;
			}
			.hour-btn{
				font-family: 'Space Mono', monospace;
				width: 56px;
				flex-shrink: 0;
				text-align: center;
			}
			.result-count{
				text-align: center;
				color: var(--muted);
				font-size: 0.82rem;
				margin-bottom: 20px;
				min-height: 1.2em;
			}
			.container{
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
				gap: 12px;
				max-width: 1400px;
				margin: 0 auto;
			}
			.timezone-card{
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 14px 16px;
				position: relative;
				transition: border-color 0.2s, transform 0.15s, background-color 0.3s;
			}
			.timezone-card:hover{
				border-color: var(--accent2);
				transform: translateY(-2px);
			}
			.card-continent{
				font-size: 0.65rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--accent);
				margin-bottom: 4px;
			}
			.card-country{
				font-size: 0.92rem;
				font-weight: 700;
				color: var(--text);
				margin-bottom: 2px;
			}
			.card-city{
				font-size: 0.75rem;
				color: var(--muted);
				margin-bottom: 6px;
			}
			.card-time{
				font-family: 'Space Mono', monospace;
				font-size: 1.5rem;
				font-weight: 700;
				color: var(--accent);
			}
			.card-date{
				font-size: 0.7rem;
				color: var(--muted);
			}
			.hidden{
				display: none !important;
			}
			*{
				-webkit-tap-highlight-color: transparent;
			}
			@media (max-width: 480px){
				.container{
					grid-template-columns: 1fr 1fr;
					gap: 8px;
				}
				.card-time{
					font-size: 1.1rem;
				}
			}
		</style>

					subtitle: "Годинники в реальному часі за місцем і годиною",
					placeholder: "Пошук міста або країни...",
					filterContinent: "Фільтр за Континентом",
					filterHour: "Фільтр за Поточною Годиною",
					all: "Усі",
					anyTime: "Усі",
					found: "часових поясів знайдено",
					foundSingle: "часовий пояс знайдено",
					label: "УК"
				},
				el: {
					title: "🌍 Παγκόσμιες Ζώνες Ώρας",
					subtitle: "Ρολόγια σε πραγματικό χρόνο ανά τοποθεσία και ώρα",
					placeholder: "Αναζήτηση πόλης ή χώρας...",
					filterContinent: "Φίλτρο ανά Ήπειρο",
					filterHour: "Φίλτρο ανά Τρέχουσα Ώρα",
					all: "Όλα",
					anyTime: "Όλα",
					found: "ζώνες ώρας βρέθηκαν",
					foundSingle: "ζώνη ώρας βρέθηκε",
					label: "ΕΛ"
				},
				la: {
					title: "🌍 Zonae Temporis Mundi",
					subtitle: "Horologia in tempore reali per locum et horam",
					placeholder: "Quaere urbem vel nationem...",
					filterContinent: "Filtra per Continentem",
					filterHour: "Filtra per Horam Praesentem",
					all: "Omnes",
					anyTime: "Omnes",
					found: "zonae temporis inventae",
					foundSingle: "zona temporis inventa",
					label: "LA"
				},
				zh: {
					title: "🌍 世界时区",
					subtitle: "按地点和小时实时显示时钟",
					placeholder: "搜索城市或国家...",
					filterContinent: "按洲筛选",
					filterHour: "按当前小时筛选",
					all: "全部",
					anyTime: "全部",
					found: "个时区已找到",
					foundSingle: "个时区已找到",
					label: "中文"
				},
				ja: {
					title: "🌍 世界のタイムゾーン",
					subtitle: "場所と時刻によるリアルタイム時計",
					placeholder: "都市または国を検索...",
					filterContinent: "大陸でフィルター",
					filterHour: "現在時刻でフィルター",
					all: "すべて",
					anyTime: "すべて",
					found: "タイムゾーンが見つかりました",
					foundSingle: "タイムゾーンが見つかりました",
					label: "日本語"
				}
			};
			const LANG_ORDER = ['en','it','fr','es','de','pt','ro','uk','el','la','zh','ja'];
			let currentLang = 'en';
			const TIME_ZONES = Intl.supportedValuesOf('timeZone');
			const CONTAINER = document.getElementById('container');
			const CONTINENT_BAR = document.getElementById('continentBar');
			const HOUR_BAR = document.getElementById('hourBar');
			const RESULT_COUNT = document.getElementById('resultCount');
			const SEARCH_INPUT = document.getElementById('searchInput');
			const THEME_TOGGLE = document.getElementById('themeToggle');
			const LANG_TOGGLE = document.getElementById('langToggle');
			let activeContinent = 'ALL';
			let activeHour = 'ALL';
			let searchQuery = '';
			const DISPLAY_NAMES = {};

			function getDisplayNames(lang){
				const localeMap = {
					en:'en-US', it:'it-IT', fr:'fr-FR', es:'es-ES', de:'de-DE',
					pt:'pt-PT', ro:'ro-RO', uk:'uk-UA', el:'el-GR', la:'la',
					zh:'zh-CN', ja:'ja-JP'
				};
				const locale = localeMap[lang] || 'en-US';
				if(!DISPLAY_NAMES[lang]){
					try{
						DISPLAY_NAMES[lang] = new Intl.DisplayNames([locale], {type: 'region'});
					}catch(e){
						DISPLAY_NAMES[lang] = new Intl.DisplayNames(['en-US'], {type: 'region'});
					}
				}
				return DISPLAY_NAMES[lang];
			}

			function getCountryName(zone, lang){
				const city = zone.split('/').pop();
				const code = CITY_TO_CODE[city];
				if(code){
					try{
						return getDisplayNames(lang).of(code);
					}catch(e){
					}
				}
				return city.replace(/_/g, ' ');
			}

			function parseZone(zone){
				const parts = zone.split('/');
				return{
					continent: parts[0],
					city: parts[parts.length - 1].replace(/_/g, ' ')
				};
			}

			THEME_TOGGLE.addEventListener('click', () => {
				document.body.classList.toggle('light-mode');
				THEME_TOGGLE.textContent = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
			});

			LANG_TOGGLE.addEventListener('click', () => {
				const idx = LANG_ORDER.indexOf(currentLang);
				currentLang = LANG_ORDER[(idx + 1)%(LANG_ORDER.length)];
				LANG_TOGGLE.textContent = TRANSLATIONS[currentLang].label;
				updateLanguage();
			});

			SEARCH_INPUT.addEventListener('input', (e) => {
				searchQuery = e.target.value.toLowerCase();
				updateVisibility();
			});

			function updateLanguage(){
				const t = TRANSLATIONS[currentLang];
				document.getElementById('mainTitle').textContent = t.title;
				document.getElementById('subTitle').textContent = t.subtitle;
				SEARCH_INPUT.placeholder = t.placeholder;
				document.getElementById('labelContinent').textContent = t.filterContinent;
				document.getElementById('labelHour').textContent = t.filterHour;
				CONTINENT_BAR.innerHTML = '';
				HOUR_BAR.innerHTML = '';
				initFilters();
				document.querySelectorAll('.timezone-card').forEach(card => {
					const zone = card.dataset.zone;
					const cont = card.dataset.continent;
					const country = getCountryName(zone, currentLang);
					card.querySelector('.card-continent').textContent = CONTINENT_LABELS[cont] ? CONTINENT_LABELS[cont][currentLang] : cont;
					card.querySelector('.card-country').textContent = country;
					card.dataset.country = country.toLowerCase();
				});
				updateTimes();
				updateVisibility();
			}

			function initFilters(){
				const continents = [...new Set(TIME_ZONES.map(z => parseZone(z).continent))].sort();
				const t = TRANSLATIONS[currentLang];
				createFilterBtn(CONTINENT_BAR, 'ALL', `🌍 ${t.all}`,
				(val) => {
					activeContinent = val;
					updateVisibility();
				}, activeContinent === 'ALL');
				continents.forEach(c => {
					const label = CONTINENT_LABELS[c] ? CONTINENT_LABELS[c][currentLang] : c;
					createFilterBtn(CONTINENT_BAR, c, label,
						(val) => {
							activeContinent = val;
							updateVisibility();
						}, activeContinent === c);
				});
				createFilterBtn(HOUR_BAR, 'ALL', t.anyTime,
				(val) => {
					activeHour = val;
					updateVisibility();
				}, activeHour === 'ALL');
				for(let i = 0; i < 24; i++){
					const h = i.toString().padStart(2, '0');
					createFilterBtn(HOUR_BAR, h, `${h}:00`,
						(val) => {
							activeHour = val;
							updateVisibility();
						}, activeHour === h, 'hour-btn');
				}
			}

			function createFilterBtn(parent, value, label, callback, isActive = false, extraClass = ''){
				const btn = document.createElement('button');
				btn.className = `filter-btn${extraClass ? ' ' + extraClass : ''}${isActive ? ' active' : ''}`;
				btn.textContent = label;
				btn.onclick = () => {
					parent.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
					btn.classList.add('active');
					callback(value);
				};
				parent.appendChild(btn);
			}

			function updateVisibility(){
				const cards = CONTAINER.querySelectorAll('.timezone-card');
				let visible = 0;
				cards.forEach(card => {
					const country = card.dataset.country;
					const city = card.dataset.city;
					const matchContinent = activeContinent === 'ALL' || card.dataset.continent === activeContinent;
					const matchHour = activeHour === 'ALL' || card.dataset.currentHour === activeHour;
					const matchSearch = searchQuery === '' || country.includes(searchQuery) || city.includes(searchQuery);
					const show = matchContinent && matchHour && matchSearch;
					card.classList.toggle('hidden', !show);
					if(show){
						visible++;
					}
				});
				const t = TRANSLATIONS[currentLang];
				RESULT_COUNT.textContent = `${visible} ${visible === 1 ? t.foundSingle : t.found}`;
			}

			function createCards(){
				const frag = document.createDocumentFragment();
				TIME_ZONES.forEach(zone => {
					const { continent, city } = parseZone(zone);
					const country = getCountryName(zone, currentLang);
					const id = zone.replaceAll('/', '_');
					const continentLabel = CONTINENT_LABELS[continent] ? CONTINENT_LABELS[continent][currentLang] : continent;
					const div = document.createElement('div');
					div.className = 'timezone-card';
					div.dataset.continent = continent;
					div.dataset.country = country.toLowerCase();
					div.dataset.city = city.toLowerCase();
					div.dataset.zone = zone;
					div.innerHTML = `
						<div class="card-continent">${continentLabel}</div>
						<div class="card-country">${country}</div>
						<div class="card-city">${city}</div>
						<div class="card-time" id="time_${id}">--:--:--</div>
						<div class="card-date" id="date_${id}"></div>
					`;
					frag.appendChild(div);
				});
				CONTAINER.appendChild(frag);
			}

			function updateTimes(){
				const now = new Date();
				const localeMap = {
					en:'en-GB', it:'it-IT', fr:'fr-FR', es:'es-ES', de:'de-DE',
					pt:'pt-PT', ro:'ro-RO', uk:'uk-UA', el:'el-GR', la:'en-GB',
					zh:'zh-CN', ja:'ja-JP'
				};
				const locale = localeMap[currentLang] || 'en-GB';
				let hourFilterChanged = false;
				TIME_ZONES.forEach(zone => {
					const id = zone.replaceAll('/', '_');
					const timeEl = document.getElementById(`time_${id}`);
					if(!timeEl){
						return;
					}
					const card = timeEl.closest('.timezone-card');
					const formatter = new Intl.DateTimeFormat('en-GB', {
						timeZone: zone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
					});
					const parts = formatter.formatToParts(now);
					const h = parts.find(p => p.type === 'hour').value;
					const m = parts.find(p => p.type === 'minute').value;
					const s = parts.find(p => p.type === 'second').value;
					timeEl.textContent = `${h}:${m}:${s}`;
					if(card.dataset.currentHour !== h){
						card.dataset.currentHour = h;
						hourFilterChanged = true;
					}
					document.getElementById(`date_${id}`).textContent = new Intl.DateTimeFormat(locale, {
						timeZone: zone, weekday: 'short', day: 'numeric', month: 'short'
					}).format(now);
				});
				if(activeHour !== 'ALL' && hourFilterChanged){
					updateVisibility();
				}
			}

			initFilters();
			createCards();
			updateTimes();
			updateVisibility();
			setInterval(updateTimes, 200);
		</script>
	</body>
</html>
