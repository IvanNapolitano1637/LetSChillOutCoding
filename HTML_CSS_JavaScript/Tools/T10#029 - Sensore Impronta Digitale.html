<!DOCTYPE html>
<html lang="it"><!--T10#029 - Giulio - Sensore Impronta Digitale-->
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sensore Impronta Digitale Realistico</title>
		<style>
			:root{
				--primary-color: #00e676;
				--bg-color: #121212;
				--button-size: 120px;
				--laser-color: #ff1744;
			}
			body{
				font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
				background-color: var(--bg-color);
				color: #eee;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				margin: 0;
				overflow: hidden;
				-webkit-font-smoothing: antialiased;
			}
			.container{
				text-align: center;
				background: #1e1e1e;
				padding: 3rem;
				border-radius: 28px;
				box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
				border: 1px solid #333;
			}
			h1{
				color: #fff;
				margin-bottom: 0.5rem;
				font-weight: 300;
				letter-spacing: 1px;
			}
			p{
				color: #aaa;
				margin-bottom: 2.5rem;
				font-size: 1rem;
			}
			.touch-button{
				background-color: #2a2a2a;
				border: 2px solid #444;
				border-radius: 50%;
				width: var(--button-size);
				height: var(--button-size);
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
				box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
				position: relative;
				overflow: hidden;
				outline: none;
				-webkit-tap-highlight-color: transparent;
				margin: 0 auto;
			}
			.touch-button:hover,
			.touch-button:focus{
				border-color: var(--primary-color);
				box-shadow: 0 0 25px rgba(0, 230, 118, 0.4);
				transform: scale(1.03);
			}
			.touch-button:active{
				transform: scale(0.97);
			}
			.touch-button svg{
				width: 78%;
				height: 78%;
				z-index: 2;
			}
			.touch-button img{
				transition: filter 0.5s ease;
				filter: brightness(0.45) sepia(0) saturate(1);
				width: 78%;
				height: 78%;
				z-index: 2;
				object-fit: contain;
			}
			.touch-button:hover img,
			.touch-button:focus img{
				/* Verde primario al hover */
				filter: brightness(1.1) sepia(1) hue-rotate(90deg) saturate(4);
			}
			.scanning img{
				filter: brightness(1.2) sepia(1) hue-rotate(90deg) saturate(5);
			}
			.laser-line{
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 5px;
				background-color: var(--laser-color);
				box-shadow: 0 0 12px var(--laser-color), 0 0 25px var(--laser-color);
				opacity: 0;
				z-index: 3;
				transform: translateY(-10px);
			}
			.scanning .laser-line{
				animation: scanAnimation 1.8s linear infinite;
				opacity: 1;
			}
			@keyframes scanAnimation{
				0%{
					transform: translateY(-10px);
				}
				100%{
					transform: translateY(calc(var(--button-size) + 10px));
				}
			}
			#status-message{
				margin-top: 2.5rem;
				font-size: 1.1rem;
				color: #aaa;
				min-height: 1.2em;
				transition: color 0.3s ease, transform 0.3s ease;
				font-weight: 400;
			}
			.scanning-text{
				color: var(--primary-color) !important;
			}
			.success-text{
				color: var(--primary-color) !important;
				font-weight: bold;
				transform: scale(1.05);
			}
			.error-text{
				color: var(--laser-color) !important;
			}
		</style>
	</head>

			<div id="status-message">Pronto per l'acquisizione...</div>
		</div>
		<script>
			let isScanning = false;
			function handleTouchAction(){
				if(isScanning){
					return;
				}
				const button = document.getElementById('auth-button');
				const status = document.getElementById('status-message');
				isScanning = true;
				button.classList.add('scanning');
				status.innerText = "Analisi creste papillari...";
				status.className = "scanning-text";
				if("vibrate" in navigator){
					navigator.vibrate([100, 50, 100]);
				}
				setTimeout(() => {
					button.classList.remove('scanning');
					const success = Math.random() > 0.15;
					if(success){
						status.innerText = "Identità Confermata!";
						status.className = "success-text";
						if("vibrate" in navigator){
							navigator.vibrate(200);
						}
					}else{
						status.innerText = "Errore: Corrispondenza non trovata.";
						status.className = "error-text";
						if("vibrate" in navigator){
							navigator.vibrate([50, 50, 50, 50]);
						}
					}
					setTimeout(() => {
						status.innerText = "Pronto per l'acquisizione...";
						status.className = "";
						isScanning = false;
					}, 2500);
				}, 3000);
			}

			document.getElementById('auth-button').addEventListener('click', handleTouchAction);
		</script>
	</body>
