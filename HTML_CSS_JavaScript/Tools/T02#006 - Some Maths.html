		<style>
			body{
				font-family: sans-serif;
				margin: 20px;
			}
			.container{
				display: flex;
				flex-wrap: wrap;
				gap: 20px;
				justify-content: center;
				flex-direction: row;
			}
			.container > div{
				flex-basis: 100%;
			}
			form{
				border: 1px solid #ccc;
				padding: 20px;
				border-radius: 8px;
				background-color: #f9f9f9;
				min-width: 320px;
			}
			canvas{
				border: 1px solid #000;
				background-color: white;
				max-width: 100%;
				height: auto;
				margin-top: 10px;
			}
			.output-text{
				font-weight: bold;
				color: #2c3e50;
				margin-top: 5px;
				display: block;
				min-height: 1.2em;
			}
			label{
				font-weight: bold;
				display: block;
				margin-top: 10px;
			}
			input[type="number"]{
				width: 80%;
				padding: 5px;
				margin-bottom: 5px;
			}
			button{
				cursor: pointer;
				padding: 5px 10px;
			}
			h3{
				margin-top: 0;
				color: #27ae60;
			}
			.action-btn{
				color: white;
				border: none;
				padding: 12px 30px;
				border-radius: 8px;
				font-weight: bold;
				cursor: pointer;
				font-size: 1rem;
				display: inline-flex;
				align-items: center;
				gap: 8px;
			}
			.btn-reset{
				background-color: #e66465;
			}
			.btn-translate{
				background-color: #4a90d9;
			}
			.flag-svg{
				width: 32px;
				height: 20px;
				display: inline-block;
				vertical-align: middle;
				border: 1px solid #aaa;
				border-radius: 2px;
				flex-shrink: 0;
			}
			*{
				-webkit-tap-highlight-color: transparent;
			}
			#kbdModal{
				display: none;
				position: fixed;
				inset: 0;
				z-index: 9999;
				background: rgba(0,0,0,0.45);
				justify-content: center;
				align-items: center;
			}
			#kbdModal.open{
				display: flex;
			}
			#kbdModalBox{
				background: #fff;
				border-radius: 12px;
				padding: 28px 32px 24px 32px;
				max-width: 480px;
				width: 92vw;
				box-shadow: 0 8px 40px rgba(0,0,0,0.22);
				position: relative;
			}
			#kbdModalBox h2{
				margin: 0 0 18px 0;
				color: #27ae60;
				font-size: 1.2rem;
				display: flex;
				align-items: center;
				gap: 10px;
			}
			#kbdModalBox table{
				width: 100%;
				border-collapse: collapse;
			}
			#kbdModalBox td{
				padding: 7px 6px;
				vertical-align: middle;
				border-bottom: 1px solid #eee;
				font-size: 0.97rem;
				color: #2c3e50;
			}
			#kbdModalBox tr:last-child td{
				border-bottom: none;
			}
			#kbdModalBox td:first-child{
				width: 44%;
				font-weight: bold;
			}
			kbd{
				display: inline-block;
				background: #f0f0f0;
				border: 1px solid #bbb;
				border-radius: 5px;
				padding: 2px 9px;
				font-family: monospace;
				font-size: 0.95rem;
				color: #333;
				box-shadow: 0 2px 0 #aaa;
				margin-right: 2px;
			}
			#kbdCloseBtn{
				position: absolute;
				top: 12px;
				right: 16px;
				background: none;
				border: none;
				font-size: 1.5rem;
				cursor: pointer;
				color: #888;
				line-height: 1;
				padding: 0 4px;
			}
			#kbdCloseBtn:hover{
				color: #e66465;
			}

	<body style="background-color:#ccffcc;">
		<div class="container">
			<form id="mathForm">
				<h3 data-i18n="title_number_theory">Number Theory</h3>
				<label data-i18n="label_primality">Primality test</label>
				<input type="number" id="firstNumber"/>
				<button type="button" id="primalityTestButton" onclick="handleAction('checkNumber')" data-i18n="btn_check">Check</button>
				<output id="isPrime" class="output-text"></output>
				<label data-i18n="label_square">Square of a number</label>
				<input type="number" id="tenthNumber"/>
				<button type="button" onclick="handleAction('calculateSquare')" data-i18n="btn_calculate">Calculate</button>
				<output id="squareOutput" class="output-text"></output>
				<label data-i18n="label_sqrt">Square root</label>
				<input type="number" id="secondNumber"/>
				<button type="button" id="squareRootButton" onclick="handleAction('squareRoot')" data-i18n="btn_calculate">Calculate</button>
				<output id="sqrt" class="output-text"></output>
				<label data-i18n="label_triangular">Triangular of a number</label>
				<input type="number" id="eleventhNumber"/>
				<button type="button" onclick="handleAction('calculateTriangular')" data-i18n="btn_calculate">Calculate</button>
				<output id="triangularOutput" class="output-text"></output>
				<label data-i18n="label_triangular_root">Triangular root</label>
				<input type="number" id="twelfthNumber"/>
				<button type="button" onclick="handleAction('checkTriangularity')" data-i18n="btn_calculate">Calculate</button>
				<output id="checkTriangularOutput" class="output-text"></output>
				<label data-i18n="label_factorization">Factorization</label>
				<input type="number" id="thirdNumber"/>
				<button type="button" id="factorization" onclick="handleAction('factorize')" data-i18n="btn_factorize">Factorize</button>
				<output id="scomposition" class="output-text"></output>
				<label data-i18n="label_bezout">Bézout's relation</label>
				<input type="number" id="fourthNumber" data-i18n-placeholder="placeholder_first"/><br>
				<input type="number" id="fifthNumber" data-i18n-placeholder="placeholder_latter"/>
				<button type="button" id="Bezout" onclick="handleAction('computeBezoutRelation')" data-i18n="btn_calculate">Calculate</button>
				<output id="BezoutsRelation" class="output-text"></output>
				<label data-i18n="label_fermat">Fermat's primality test</label>
				<input type="number" id="sixthNumber"/>
				<button type="button" id="primalityTestOfFermatButton" onclick="handleAction('applyFermatsPrimalityTest')" data-i18n="btn_test">Test</button>
				<output id="mayBePrime" class="output-text"></output>
				<label data-i18n="label_polygon_area">Regular polygon area</label>
				<input type="number" id="seventhNumber" data-i18n-placeholder="placeholder_sides"/><br>
				<input type="number" id="eighthNumber" data-i18n-placeholder="placeholder_side_length"/>
				<button type="button" id="calculateAreaButton" onclick="handleAction('calculatePolygonArea')" data-i18n="btn_calc_area">Calculate the area</button>
				<output id="polygonArea" class="output-text"></output>
				<label data-i18n="label_sum_squares">Sum of two squares</label>
				<input type="number" id="ninthNumber"/>
				<button type="button" id="sumOfSquares" onclick="handleAction('writeAsSumOfSquares')" data-i18n="btn_find">Find</button>
				<div id="squares" class="output-text"></div>
			</form>
			<div style="width: 100%; text-align: center; margin: 10px 0; display:flex; justify-content:center; gap:16px; flex-wrap:wrap;">
				<button type="button" class="action-btn btn-reset" onclick="clearAll()" data-i18n="btn_reset">Reset Page</button>
				<button type="button" id="translateBtn" class="action-btn btn-translate" onclick="nextLanguage()">
					<span id="flagIcon"></span>
				</button>
			</div>
			<form>
				<h3 data-i18n="title_polygon_view">Polygon View</h3>
				<label for="numberOfSides"><span data-i18n="label_sides">Number of sides:</span> <select id="numberOfSides"></select></label><br>
				<label style="display:inline;">
					<input id="diagonals" type="checkbox" onChange="toggleDiagonals()"> <span data-i18n="label_diagonals">Show diagonals</span>
				</label><br>
				<canvas id="canvas" width="600" height="600"></canvas>
			</form>
		</div>
		<div id="kbdModal" role="dialog" aria-modal="true" aria-labelledby="kbdModalTitle">

				<button id="kbdCloseBtn" onclick="closeKbdModal()" aria-label="Close">✕</button>

					<tbody id="kbdShortcutTable">

						<tr><td><kbd>R</kbd></td><td data-i18n="kbd_reset">Reset the page</td></tr>
						<tr><td><kbd>Enter</kbd></td><td data-i18n="kbd_enter">Confirm input in focused field</td></tr>
						<tr><td><kbd>Esc</kbd></td><td data-i18n="kbd_close_modal">Close this window</td></tr>
					</tbody>
				</table>
			</div>

			let currentLangIndex = 0;

			function applyTranslation(langIndex){
				const langKey = LANG_KEYS[langIndex];
				const t = TRANSLATIONS[langKey];
				if(!t){
					return;
				}
				document.querySelectorAll('[data-i18n]').forEach(el => {
					const key = el.getAttribute('data-i18n');
					if(t[key] !== undefined){
						el.textContent = t[key];
					}
				});
				document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
					const key = el.getAttribute('data-i18n-placeholder');
					if(t[key] !== undefined){
						el.placeholder = t[key];
					}
				});
				document.documentElement.lang = langKey;
				document.getElementById('flagIcon').innerHTML = FLAGS_SVG[langIndex];
			}

			function tr(key, vars){
				const langKey = LANG_KEYS[currentLangIndex];
				const t = TRANSLATIONS[langKey];
				let str = (t && t[key] !== undefined) ? t[key] : (TRANSLATIONS['en'][key] || key);
				if(vars){
					for(const k in vars){
						str = str.replace('{' + k + '}', vars[k]);
					}
				}
				return str;
			}

			function nextLanguage(){
				currentLangIndex = (currentLangIndex + 1)%(LANG_KEYS.length);
				applyTranslation(currentLangIndex);
				retranslateOutputs();
			}

			function clearAll(){
				location.reload();
			}

			function clearOutputs(){
				const outputs = ["isPrime", "sqrt", "scomposition", "BezoutsRelation", "mayBePrime", "polygonArea", "squareOutput", "triangularOutput", "checkTriangularOutput"];
				outputs.forEach(id => {
					const el = document.getElementById(id);
					if(el){
						el.value = "";
						el.innerHTML = "";
					}
				});
				document.getElementById("squares").innerHTML = "";
			}

			const lastActions = new Set();

			function handleAction(actionName){
				clearOutputs();
				lastActions.clear();
				lastActions.add(actionName);
				if(typeof window[actionName] === "function"){
					window[actionName]();
				}
			}

			function retranslateOutputs(){
				lastActions.forEach(actionName => {
					if(typeof window[actionName] === "function"){
						window[actionName]();
					}
				});
			}

			let flagDiagonals = false;
			const CANVAS = document.getElementById('canvas');
			if(window.innerWidth < 600){
				CANVAS.width = 300;
				CANVAS.height = 300;
			}

			function fillSelectOption(){
				const select = document.getElementById("numberOfSides");
				for(let i = 3; i <= 60; i++){
					let opt = document.createElement('option');
					opt.value = i;
					opt.innerHTML = i;
					select.appendChild(opt);
				}
			}

			function toggleDiagonals(){
				flagDiagonals = !flagDiagonals;
				drawPolygon();
			}

			function drawPolygon(){
				const numberOfSides = parseInt(document.getElementById('numberOfSides').value);
				const ctx = CANVAS.getContext('2d');
				const centerX = CANVAS.width/2;
				const centerY = CANVAS.height/2;
				const radius = CANVAS.width*0.45;
				const angleStep = (2*Math.PI)/numberOfSides;
				ctx.clearRect(0, 0, CANVAS.width, CANVAS.height);
				let vertices = [];
				for(let i = 0; i < numberOfSides; i++){
					const angle = (-0.5*Math.PI) + (i*angleStep);
					vertices.push({x: centerX + radius*Math.cos(angle), y: centerY + radius*Math.sin(angle) });
				}
				ctx.beginPath();
				ctx.strokeStyle = "#27ae60";
				ctx.lineWidth = 2;
				ctx.moveTo(vertices[0].x, vertices[0].y);
				for(let i = 1; i < numberOfSides; i++){
					ctx.lineTo(vertices[i].x, vertices[i].y);
				}
				ctx.closePath();
				ctx.stroke();
				if(flagDiagonals){
					ctx.strokeStyle = "rgba(192, 57, 43, 0.2)";
					ctx.lineWidth = 1;
					for(let i = 0; i < vertices.length; i++){
						for(let j = i + 2; j < vertices.length; j++){
							if(i === 0 && j === vertices.length - 1){
								continue;
							}
							ctx.beginPath();
							ctx.moveTo(vertices[i].x, vertices[i].y);
							ctx.lineTo(vertices[j].x, vertices[j].y);
							ctx.stroke();
						}
					}
				}
			}

			function checkNumber(){
				const val = document.getElementById("firstNumber").value;
				if(!val){
					return;
				}
				const n = parseInt(val);
				let key = "out_is_prime";
				if(n < 2){
					key = "out_is_neither";
				}else{
					for(let i = 2; i*i <= n; i++){
						if(n%i === 0){
							key = "out_is_composite";
							break;
						}
					}
				}
				document.getElementById("isPrime").value = tr(key, {n});
			}

			function calculateSquare(){
				const n = parseFloat(document.getElementById("tenthNumber").value);
				if(isNaN(n)){
					return;
				}
				document.getElementById("squareOutput").value = `${n}² = ${n*n}`;
			}

			function squareRoot(){
				const n = parseInt(document.getElementById("secondNumber").value);
				if(isNaN(n) || n < 0){
					return;
				}
				let m = Math.floor(Math.sqrt(n));
				document.getElementById("sqrt").value = (m*m === n) ? `${n} = ${m}²` : `${n} = ${m}² + ${n -(m*m)}`;
			}

			function calculateTriangular(){
				const n = parseInt(document.getElementById("eleventhNumber").value);
				if(isNaN(n) || n < 0){
					return;
				}
				const triangular = (n*(n + 1))/2;
				document.getElementById("triangularOutput").value = `T(${n}) = ${triangular}`;
			}

			function checkTriangularity(){
				const x = parseInt(document.getElementById("twelfthNumber").value);
				if(isNaN(x) || x < 0){
					return;
				}
				const nFloat = (Math.sqrt(8*x + 1) - 1)/2;
				const n = Math.floor(nFloat);
				const lowerTriangular = (n*(n + 1))/2;
				document.getElementById("checkTriangularOutput").value = (x + " = " + "T(" + n + ")" + (Number.isInteger(nFloat) ? "" : (" + " + (x - lowerTriangular))));
			}

			function getExp(iExp){
				const expDigits = ["⁰","¹","²","³","⁴","⁵","⁶","⁷","⁸","⁹"];
				return iExp <= 1 ? "" : iExp.toString().split('').map(d => expDigits[d]).join('');
			}

			function factorize(){
				let n = parseInt(document.getElementById("thirdNumber").value);
				if(isNaN(n) || n <= 1){
					return;
				}
				let temp = n, result = [], count = 0;
				while(temp%2 === 0){
					count++;
					temp /= 2;
				}
				if(count > 0){
					result.push("2" + getExp(count));
				}
				for(let i = 3; i*i <= temp; i += 2){
					count = 0;
					while(temp%i === 0){
						count++;
						temp /= i;
					}
					if(count > 0){
						result.push(i + getExp(count));
					}
				}
				if(temp > 1){
					result.push(temp.toString());
				}
				document.getElementById("scomposition").value = (result.length === 1 && parseInt(result[0]) === n) ? tr("out_prime_number") : n + " = " + result.join(" × ");
			}

			function computeBezoutRelation(){
				const a = parseInt(document.getElementById("fourthNumber").value);
				const b = parseInt(document.getElementById("fifthNumber").value);
				if(isNaN(a) || isNaN(b)){
					return;
				}
				let old_r = a, r = b, old_s = 1, s = 0, old_t = 0, t = 1;
				while(r !== 0){
					let q = Math.floor(old_r/r);
					[old_r, r] = [r, old_r - q*r];
					[old_s, s] = [s, old_s - q*s];
					[old_t, t] = [t, old_t - q*t];
				}
				document.getElementById("BezoutsRelation").value = `(${old_s})*${a} +(${old_t})*${b} = ${old_r}`;
			}

			function applyFermatsPrimalityTest_0(){//SOLO FERMAT...
				let val = document.getElementById("sixthNumber").value;
				if(!val){
					return;
				}
				let n = BigInt(val);
				if(n <= 1n){
					return;
				}
				if(n === 2n){
					document.getElementById("mayBePrime").value = tr("out_seems_prime");
					return;
				}
				const modExp = (b, e, m) => {
					let r = 1n;
					b %= m;
					while(e > 0n){
						if(e%2n === 1n){
							r = (r*b)%m;
						}
						b = (b*b)%m;
						e = e/2n;
					}
					return r;
				};
				let isP = true;
				for(let a of [2n, 3n, 5n]){
					if(a >= n){
						break;
					}
					if(modExp(a, n - 1n, n) !== 1n){
						isP = false;
						break;
					}
				}
				document.getElementById("mayBePrime").value = isP ? tr("out_seems_prime") : tr("out_definitely_composite");
			}

			function applyFermatsPrimalityTest(){//...SIA FERMAT CHE MILLER RABIN.
				let val = document.getElementById("sixthNumber").value;
				if(!val){
					return;
				}
				let n = BigInt(val);
				if(n < 2n){
					document.getElementById("mayBePrime").value = tr("out_neither_prime_composite");
					return;
				}
				if(n === 2n || n === 3n){
					document.getElementById("mayBePrime").value = tr("out_definitely_prime");
					return;
				}
				if(n%2n === 0n){
					document.getElementById("mayBePrime").value = tr("out_composite_even");
					return;
				}
				const modExp = (base, exp, mod) => {
					let res = 1n;
					base %= mod;
					while(exp > 0n){
						if(exp % 2n === 1n){
							res = (res*base)%mod;
						}
						base = (base*base)%mod;
						exp /= 2n;
					}
					return res;
				};
				let d = n - 1n;
				let s = 0n;
				while(d%2n === 0n){
					d /= 2n;
					s++;
				}
				// Per n < 3,317,044,064,679,887,361 basta testare queste basi
				const bases = [2n, 3n, 5n, 7n, 11n, 13n, 17n, 19n, 23n];
				for(let a of bases){
					if(n <= a){
						break;
					}
					let x = modExp(a, d, n);
					if(x === 1n || x === n - 1n){
						continue;
					}
					let composite = true;
					for(let r = 1n; r < s; r++){
						x = (x*x)%n;
						if(x === n - 1n){
							composite = false;
							break;
						}
					}
					if(composite){
						document.getElementById("mayBePrime").value = tr("out_definitely_composite");
						return;
					}
				}
				document.getElementById("mayBePrime").value = tr("out_likely_prime");
			}

			function calculatePolygonArea(){
				let n = parseInt(document.getElementById("seventhNumber").value);
				let s = parseFloat(document.getElementById("eighthNumber").value);
				if(n < 3 || s <= 0){
					return;
				}
				let area = (n*s**2)/(4*Math.tan(Math.PI/n));
				document.getElementById("polygonArea").value = tr("out_area", {area: area.toFixed(4)});
			}

			function writeAsSumOfSquares(){
				const n = parseInt(document.getElementById("ninthNumber").value);
				if(isNaN(n)){
					return;
				}
				let out = "";
				for(let i = 0; i*i <= n/2; i++){
					let j = Math.sqrt(n - i*i);
					if(Number.isInteger(j)){
						out += `<div>${j}² + ${i}²</div>`;
					}
				}
				document.getElementById("squares").innerHTML = out || tr("out_no_solution");
			}

			document.getElementById('numberOfSides').addEventListener('change', drawPolygon);

			document.querySelectorAll('input').forEach(input => {
				input.addEventListener('keypress',(e) => {
					if(e.key === 'Enter'){
						e.preventDefault();
						const btn = input.nextElementSibling?.tagName === 'BUTTON' ? input.nextElementSibling : input.parentElement.querySelector('button');
						if(btn){
							btn.click();
						}
					}
				});
			});

			document.addEventListener("keydown", e => {
				if(e.key === "?"){
					if(document.activeElement && document.activeElement.tagName === "INPUT"){
						return;
					}
					e.preventDefault();
					toggleKbdModal();
				}else if(e.key === "Escape"){
					closeKbdModal();
				}else if(e.key.toLowerCase() === "l"){
					if(document.activeElement && document.activeElement.tagName === "INPUT"){
						return;
					}
					nextLanguage();
				}else if(e.key.toLowerCase() === "r"){
					if(document.activeElement && document.activeElement.tagName === "INPUT"){
						return;
					}
					clearAll();
				}
			});

			function toggleKbdModal(){
				const modal = document.getElementById("kbdModal");
				if(modal.classList.contains("open")){
					closeKbdModal();
				}else{
					modal.classList.add("open");
				}
			}

			function closeKbdModal(){
				document.getElementById("kbdModal").classList.remove("open");
			}

			document.getElementById("kbdModal").addEventListener("click", function(e){
				if(e.target === this){
					closeKbdModal();
				}
			});

			fillSelectOption();
			drawPolygon();
			applyTranslation(currentLangIndex);
