<!doctype html>
<html lang="en"><!--T09#028 - Ciro - Animated Radial Menu-->
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Animated Radial Menu</title>
		<style>
			*{
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body{
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				background: #2f363e;
				overflow: hidden;
			}
			.menu-container{
				position: relative;
				width: 280px;
				height: 280px;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.menu{
				position: relative;
				width: 100%;
				height: 100%;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.menu li{
				position: absolute;
				left: 0;
				list-style: none;
				transition: 0.5s;
				transform-origin: 140px;
				transform: rotate(0deg) translateX(110px);
			}
			.menu-container.active .menu li{
				transform: rotate(calc(360deg / 8 * var(--i))) translateX(0px);
			}
			.menu li a{
				display: flex;
				justify-content: center;
				align-items: center;
				width: 60px;
				height: 60px;
				color: var(--clr);
				border: 2px solid var(--clr);
				border-radius: 50%;
				font-size: 1.5em;
				transform: rotate(calc(360deg / -8 * var(--i)));
				transition: 1s;
			}
			.menu li a:hover{
				transition: 0s;
				background: var(--clr);
				color: #333;
				box-shadow: 0 0 10px var(--clr), 0 0 30px var(--clr), 0 0 50px var(--clr);
			}
			.toggle{
				position: absolute;
				width: 60px;
				height: 60px;
				background: #2f363e;
				border: 2px solid #fff;
				border-radius: 50%;
				color: #fff;
				display: flex;
				justify-content: center;
				align-items: center;
				cursor: pointer;
				z-index: 10000;
				font-size: 2em;
				transition: transform 1.25s;
			}
			.menu-container.active .toggle{
				transform: rotate(315deg);
			}
			.menu-item-0{
				--i: 0;
				--clr: #ff2972;
				transition-delay: calc(0.1s * 0) !important;
			}
			.menu-item-1{
				--i: 1;
				--clr: #fee800;
				transition-delay: calc(0.1s * 1) !important;
			}
			.menu-item-2{
				--i: 2;
				--clr: #04fc43;
				transition-delay: calc(0.1s * 2) !important;
			}
			.menu-item-3{
				--i: 3;
				--clr: #fe00f1;
				transition-delay: calc(0.1s * 3) !important;
			}
			.menu-item-4{
				--i: 4;
				--clr: #00b0fe;
				transition-delay: calc(0.1s * 4) !important;
			}
			.menu-item-5{
				--i: 5;
				--clr: #fea600;
				transition-delay: calc(0.1s * 5) !important;
			}
			.menu-item-6{
				--i: 6;
				--clr: #a529ff;
				transition-delay: calc(0.1s * 6) !important;
			}
			.menu-item-7{
				--i: 7;
				--clr: #01bdab;
				transition-delay: calc(0.1s * 7) !important;
			}
			@media (max-width: 480px){
				.menu-container{
					transform: scale(0.8);
				}
			}
			*{
				-webkit-tap-highlight-color: transparent;
			}
		</style>
	</head>
	<body>
		<nav class="menu-container">
			<div class="toggle" title="Expand Menu">
				<ion-icon name="add-outline"></ion-icon>
			</div>
			<ul class="menu">
				<li class="menu-item-0">
					<a href="#" title="Home"><ion-icon name="home-outline"></ion-icon></a>
				</li>
				<li class="menu-item-1">
					<a href="#" title="Profile"><ion-icon name="person-outline"></ion-icon></a>
				</li>
				<li class="menu-item-2">
					<a href="#" title="Settings"><ion-icon name="settings-outline"></ion-icon></a>
				</li>
				<li class="menu-item-3">
					<a href="#" title="Messages"><ion-icon name="mail-outline"></ion-icon></a>
				</li>
				<li class="menu-item-4">
					<a href="#" title="Security"><ion-icon name="key-outline"></ion-icon></a>
				</li>
				<li class="menu-item-5">
					<a href="#" title="Video"><ion-icon name="videocam-outline"></ion-icon></a>
				</li>
				<li class="menu-item-6">
					<a href="#" title="Games"><ion-icon name="game-controller-outline"></ion-icon></a>
				</li>
				<li class="menu-item-7">
					<a href="#" title="Camera"><ion-icon name="camera-outline"></ion-icon></a>
				</li>
			</ul>
		</nav>
		<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
		<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
		<script>
			let toggle = document.querySelector('.toggle');
			let container = document.querySelector('.menu-container');
			toggle.onclick = function (){
				container.classList.toggle('active');
			}
			let menuLinks = document.querySelectorAll('.menu li a');
			menuLinks.forEach(link => {
				link.onclick = function(e) {
					e.preventDefault();
				}
			});
		</script>
	</body>
</html>
