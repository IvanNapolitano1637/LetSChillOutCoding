<!DOCTYPE html>
<html lang="en"><!--T11#030 - Teresa - Vibrations Explorer-->
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>JS Vibration Explorer - Pro Edition</title>
		<style>
			body{
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 20px;
				background-color: #f4f7f6;
				color: #333;
			}
			.card{
				background: white;
				padding: 1.5rem;
				border-radius: 20px;
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
				max-width: 480px;
				width: 100%;
			}
			h1{
				font-size: 1.4rem;
				color: #e91e63;
				text-align: center;
				margin-top: 0;
			}
			#visualizer-box{
				width: 100%;
				height: 80px;
				background-color: #222;
				border-radius: 12px;
				margin-bottom: 20px;
				position: relative;
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			#vibe-bar{
				width: 100%;
				height: 100%;
				background: linear-gradient(90deg, #e91e63, #ff5722);
				opacity: 0;
				transform: scaleX(0);
				transition: opacity 0.1s, transform 0.1s;
			}
			.vibrating #vibe-bar{
				opacity: 1;
				transform: scaleX(1);
				animation: shake 0.1s infinite;
			}
			@keyframes shake{
				0%{
					transform: translate(2px, 1px) rotate(0deg);
				}
				50%{
					transform: translate(-1px, -2px) rotate(-1deg);
				}
				100%{
					transform: translate(1px, 2px) rotate(1deg);
				}
			}
			.group{
				margin-bottom: 1rem;
			}
			label{
				display: block;
				margin-bottom: 4px;
				font-weight: bold;
				font-size: 0.85rem;
				color: #666;
			}
			input{
				width: 100%;
				padding: 10px;
				border: 2px solid #eee;
				border-radius: 8px;
				box-sizing: border-box;
				font-family: monospace;
				font-size: 0.9rem;
			}
			.presets{
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 8px;
				margin-bottom: 15px;
			}
			.btn-preset{
				background: #f0f0f0;
				border: 1px solid #ddd;
				padding: 8px;
				font-size: 0.75rem;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.2s;
			}
			.btn-preset:hover{
				background: #e91e63;
				color: white;
				border-color: #e91e63;
			}
			.main-actions{
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			button.primary{
				padding: 14px;
				border: none;
				border-radius: 10px;
				cursor: pointer;
				font-weight: bold;
				color: white;
			}
			.btn-play{
				background-color: #4caf50;
			}
			.btn-stop{
				background-color: #222;
			}
			#status{
				text-align: center;
				font-size: 0.8rem;
				margin-top: 10px;
				height: 15px;
				color: #e91e63;
				font-weight: bold;
			}
			*{
				-webkit-tap-highlight-color: transparent;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Vibration Lab 💓</h1>
			<div id="visualizer-box">
				<div id="vibe-bar"></div>
			</div>
			<div id="status"></div>
			<div class="group">
				<label>Quick Presets</label>
				<div class="presets">
					<button class="btn-preset" onclick="loadPreset('Heartbeat', [100, 100, 100], 1200)">💓 Heartbeat</button>
					<button class="btn-preset" onclick="loadPreset('SOS', [100,100,100,300,100,300,100,300,100,100,100], 3000)">🆘 SOS Morse</button>
					<button class="btn-preset" onclick="loadPreset('Rapid Pulse', [50, 50], 200)">⚡ Rapid Pulse</button>
					<button class="btn-preset" onclick="loadPreset('Jitter', [20, 20, 20, 100], 600)">📳 Jitter</button>
				</div>
			</div>
			<div class="group">
				<label>Custom Pattern (ms)</label>
				<input title="CustomPattern" type="text" id="pattern" value="100, 100, 100">
			</div>
			<div class="group">
				<label>Loop Interval (ms)</label>
				<input title="LoopInterval" type="number" id="interval" value="1200">
			</div>
			<div class="main-actions">
				<button class="primary btn-play" onclick="startLoop()">START LOOP</button>
				<button class="primary btn-stop" onclick="stopEverything()">STOP</button>
			</div>
		</div>
		<script>
			let loopRef = null;
			let animationRefs = [];
			const box = document.getElementById('visualizer-box');
			const status = document.getElementById('status');

			function loadPreset(name, pattern, interval){
				document.getElementById('pattern').value = pattern.join(', ');
				document.getElementById('interval').value = interval;
				status.innerText = "Loaded: " + name;
				startLoop();
			}

			function triggerVisuals(pattern){
				animationRefs.forEach(clearTimeout);
				animationRefs = [];
				let offset = 0;
				pattern.forEach((time, index) =>{
					if(index%2 === 0){
						let start = setTimeout(() => box.classList.add('vibrating'), offset);
						let end = setTimeout(() => box.classList.remove('vibrating'), offset + time);
						animationRefs.push(start, end);
					}
					offset += time;
				});
			}

			function startLoop(){
				stopEverything();
				const raw = document.getElementById('pattern').value;
				const pattern = raw.split(',').map(v => parseInt(v.trim())).filter(v => !isNaN(v));
				const interval = parseInt(document.getElementById('interval').value);
				if(!pattern.length){
					return;
				}
				const run = () => {
					if(navigator.vibrate){
						navigator.vibrate(pattern);
					}
					triggerVisuals(pattern);
				};
				run();
				loopRef = setInterval(run, interval);
				status.innerText = "Looping Pattern...";
			}

			function stopEverything(){
				clearInterval(loopRef);
				animationRefs.forEach(clearTimeout);
				if(navigator.vibrate){
					navigator.vibrate(0);
				}
				box.classList.remove('vibrating');
				status.innerText = "System Idle";
			}
		</script>
	</body>
</html>
